<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 听脑AI</title>
    <style>
      :root {
        --primary-blue: #3B82F6;
        --primary-light: #60A5FA;
        --primary-lighter: #93C5FD;
        --primary-bg: #EBF4FF;
        --text-dark: #1F2937;
        --text-muted: #6B7280;
        --bg-white: #FFFFFF;
        --bg-light: #F9FAFB;
        --border-color: #E5E7EB;
        --error: #EF4444;
        --success: #10B981;
        --wechat-green: #07C160;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      body {
        font-family: "HarmonyOS Sans SC", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        background-color: var(--bg-light);
        color: var(--text-dark);
        min-height: 100vh;
      }

      /* 主容器 - 左右分栏 */
      .login-container {
        display: flex;
        min-height: 100vh;
      }

      /* 左侧品牌区 */
      .brand-section {
        flex: 0 0 40%;
        background: linear-gradient(135deg, #1E40AF 0%, #3B82F6 50%, #60A5FA 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 60px;
        position: relative;
        overflow: hidden;
      }

      /* 品牌区装饰动画 */
      .brand-section::before {
        content: '';
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 50%);
        animation: float 6s ease-in-out infinite;
      }

      @keyframes float {
        0%, 100% { transform: translate(0, 0) rotate(0deg); }
        50% { transform: translate(-20px, -20px) rotate(5deg); }
      }

      .brand-content {
        position: relative;
        z-index: 1;
        text-align: center;
        color: white;
      }

      .brand-logo {
        width: 80px;
        height: 80px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 24px;
        backdrop-filter: blur(10px);
      }

      .brand-logo svg {
        width: 48px;
        height: 48px;
      }

      .brand-name {
        font-size: 32px;
        font-weight: 700;
        margin-bottom: 12px;
        letter-spacing: 2px;
      }

      .brand-slogan {
        font-size: 18px;
        opacity: 0.9;
        margin-bottom: 32px;
      }

      .brand-value {
        font-size: 16px;
        opacity: 0.8;
        line-height: 1.8;
        max-width: 300px;
        margin: 0 auto;
      }

      /* 浮动装饰元素 */
      .floating-shapes {
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        pointer-events: none;
      }

      .shape {
        position: absolute;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 50%;
      }

      .shape-1 {
        width: 100px;
        height: 100px;
        top: 10%;
        left: 10%;
        animation: float-1 8s ease-in-out infinite;
      }

      .shape-2 {
        width: 60px;
        height: 60px;
        bottom: 20%;
        right: 15%;
        animation: float-2 6s ease-in-out infinite;
      }

      .shape-3 {
        width: 80px;
        height: 80px;
        top: 60%;
        left: 5%;
        animation: float-3 10s ease-in-out infinite;
      }

      @keyframes float-1 {
        0%, 100% { transform: translate(0, 0); }
        50% { transform: translate(30px, -30px); }
      }

      @keyframes float-2 {
        0%, 100% { transform: translate(0, 0); }
        50% { transform: translate(-20px, 20px); }
      }

      @keyframes float-3 {
        0%, 100% { transform: translate(0, 0); }
        50% { transform: translate(15px, -25px); }
      }

      /* 右侧登录区 */
      .login-section {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px;
      }

      .login-card {
        width: 100%;
        max-width: 440px;
        background: var(--bg-white);
        border-radius: 16px;
        padding: 48px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      }

      .login-header {
        margin-bottom: 36px;
      }

      .login-title {
        font-size: 28px;
        font-weight: 700;
        color: var(--text-dark);
        margin-bottom: 8px;
      }

      .login-subtitle {
        font-size: 14px;
        color: var(--text-muted);
      }

      /* 表单样式 */
      .form-group {
        margin-bottom: 20px;
      }

      .form-label {
        display: block;
        font-size: 14px;
        font-weight: 500;
        color: var(--text-dark);
        margin-bottom: 8px;
      }

      .phone-input-wrapper {
        display: flex;
        border: 1px solid var(--border-color);
        border-radius: 12px;
        overflow: hidden;
        transition: all 0.3s ease;
      }

      .phone-input-wrapper:focus-within {
        border-color: var(--primary-blue);
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
      }

      .phone-prefix {
        padding: 14px 16px;
        background: var(--bg-light);
        border-right: 1px solid var(--border-color);
        font-size: 14px;
        color: var(--text-dark);
        font-weight: 500;
      }

      .phone-input {
        flex: 1;
        padding: 14px 16px;
        border: none;
        outline: none;
        font-size: 14px;
        font-family: inherit;
      }

      .phone-input::placeholder {
        color: var(--text-muted);
      }

      .code-input-wrapper {
        display: flex;
        gap: 12px;
      }

      .code-input {
        flex: 1;
        padding: 14px 16px;
        border: 1px solid var(--border-color);
        border-radius: 12px;
        font-size: 14px;
        font-family: inherit;
        outline: none;
        transition: all 0.3s ease;
      }

      .code-input:focus {
        border-color: var(--primary-blue);
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
      }

      .code-input::placeholder {
        color: var(--text-muted);
      }

      .send-code-btn {
        padding: 14px 20px;
        background: var(--primary-blue);
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        white-space: nowrap;
        transition: all 0.3s ease;
        min-width: 120px;
      }

      .send-code-btn:hover:not(:disabled) {
        background: var(--primary-light);
        transform: translateY(-1px);
      }

      .send-code-btn:disabled {
        background: var(--border-color);
        cursor: not-allowed;
      }

      /* 登录按钮 */
      .login-btn {
        width: 100%;
        padding: 16px;
        background: linear-gradient(135deg, var(--primary-blue), var(--primary-light));
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
      }

      .login-btn:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3);
      }

      .login-btn:disabled {
        opacity: 0.7;
        cursor: not-allowed;
      }

      .login-btn.loading {
        pointer-events: none;
      }

      .login-btn .btn-text {
        transition: opacity 0.3s ease;
      }

      .login-btn.loading .btn-text {
        opacity: 0;
      }

      .login-btn .spinner {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 24px;
        height: 24px;
        border: 3px solid rgba(255, 255, 255, 0.3);
        border-top-color: white;
        border-radius: 50%;
        opacity: 0;
        transition: opacity 0.3s ease;
      }

      .login-btn.loading .spinner {
        opacity: 1;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to { transform: translate(-50%, -50%) rotate(360deg); }
      }

      /* 分割线 */
      .divider {
        display: flex;
        align-items: center;
        margin: 28px 0;
      }

      .divider::before,
      .divider::after {
        content: '';
        flex: 1;
        height: 1px;
        background: var(--border-color);
      }

      .divider span {
        padding: 0 16px;
        font-size: 14px;
        color: var(--text-muted);
      }

      /* 微信登录按钮 */
      .wechat-btn {
        width: 100%;
        padding: 14px;
        background: var(--bg-white);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        transition: all 0.3s ease;
        position: relative;
      }

      .wechat-btn:hover {
        border-color: var(--wechat-green);
        background: #f0fdf4;
      }

      .wechat-icon {
        width: 24px;
        height: 24px;
      }

      .wechat-badge {
        position: absolute;
        top: -8px;
        right: 12px;
        background: var(--primary-blue);
        color: white;
        font-size: 10px;
        padding: 2px 8px;
        border-radius: 10px;
      }

      /* 协议勾选 */
      .agreement {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        margin-top: 24px;
      }

      .agreement input[type="checkbox"] {
        width: 18px;
        height: 18px;
        margin-top: 2px;
        accent-color: var(--primary-blue);
        cursor: pointer;
      }

      .agreement-text {
        font-size: 12px;
        color: var(--text-muted);
        line-height: 1.6;
      }

      .agreement-link {
        color: var(--primary-blue);
        text-decoration: none;
      }

      .agreement-link:hover {
        text-decoration: underline;
      }

      /* 错误提示 */
      .error-message {
        color: var(--error);
        font-size: 12px;
        margin-top: 8px;
        display: none;
      }

      .error-message.show {
        display: block;
      }

      /* 成功提示 */
      .success-toast {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%) translateY(-100px);
        background: var(--success);
        color: white;
        padding: 16px 32px;
        border-radius: 12px;
        font-size: 14px;
        font-weight: 500;
        box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3);
        transition: transform 0.3s ease;
        z-index: 1000;
      }

      .success-toast.show {
        transform: translateX(-50%) translateY(0);
      }

      /* 注册提示 */
      .register-hint {
        text-align: center;
        margin-top: 24px;
        font-size: 14px;
        color: var(--text-muted);
      }

      .register-link {
        color: var(--primary-blue);
        text-decoration: none;
        font-weight: 500;
      }

      .register-link:hover {
        text-decoration: underline;
      }

      /* 输入框错误状态 */
      .input-error {
        border-color: var(--error) !important;
      }

      .input-error:focus {
        box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1) !important;
      }

      /* 响应式设计 */
      @media (max-width: 1024px) {
        .brand-section {
          flex: 0 0 35%;
          padding: 40px;
        }

        .brand-name {
          font-size: 28px;
        }
      }

      @media (max-width: 768px) {
        .login-container {
          flex-direction: column;
        }

        .brand-section {
          flex: none;
          padding: 40px 20px;
          min-height: 200px;
        }

        .brand-logo {
          width: 60px;
          height: 60px;
        }

        .brand-logo svg {
          width: 36px;
          height: 36px;
        }

        .brand-name {
          font-size: 24px;
          margin-bottom: 8px;
        }

        .brand-slogan {
          font-size: 16px;
          margin-bottom: 16px;
        }

        .brand-value {
          font-size: 14px;
        }

        .login-section {
          padding: 20px;
        }

        .login-card {
          padding: 32px 24px;
        }

        .login-title {
          font-size: 24px;
        }
      }
    </style>
</head>
<body>
    <!-- 成功提示 -->
    <div class="success-toast" id="successToast">登录成功，正在跳转...</div>

    <div class="login-container">
        <!-- 左侧品牌展示区 -->
        <div class="brand-section">
            <!-- 浮动装饰 -->
            <div class="floating-shapes">
                <div class="shape shape-1"></div>
                <div class="shape shape-2"></div>
                <div class="shape shape-3"></div>
            </div>

            <div class="brand-content">
                <div class="brand-logo">
                    <!-- 大脑+声波 Logo SVG -->
                    <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <!-- 大脑轮廓 -->
                        <path d="M24 8C18 8 14 12 14 18C14 20 15 22 16 23C15 24 14 26 14 28C14 30 15 32 17 33C17 35 18 37 20 38C21 39 23 40 24 40C25 40 27 39 28 38C30 37 31 35 31 33C33 32 34 30 34 28C34 26 33 24 32 23C33 22 34 20 34 18C34 12 30 8 24 8Z" fill="white" fill-opacity="0.9"/>
                        <!-- 声波效果 -->
                        <path d="M38 20C39 21 40 23 40 25C40 27 39 29 38 30" stroke="white" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.7"/>
                        <path d="M42 17C44 19 45 22 45 25C45 28 44 31 42 33" stroke="white" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.5"/>
                        <!-- 脑内细节 -->
                        <path d="M20 18C20 18 22 16 24 18C26 20 28 18 28 18" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.6"/>
                        <path d="M19 24C19 24 22 22 24 24C26 26 29 24 29 24" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.6"/>
                    </svg>
                </div>
                <h1 class="brand-name">听脑AI</h1>
                <p class="brand-slogan">你的AI录音助手</p>
                <p class="brand-value">两小时录音，3分钟总结<br>10倍效率提升</p>
            </div>
        </div>

        <!-- 右侧登录表单区 -->
        <div class="login-section">
            <div class="login-card">
                <div class="login-header">
                    <h2 class="login-title">欢迎回来</h2>
                    <p class="login-subtitle">登录听脑AI，开启智能录音体验</p>
                </div>

                <!-- 手机号登录表单 -->
                <form id="loginForm" onsubmit="return false;">
                    <!-- 手机号输入 -->
                    <div class="form-group">
                        <label class="form-label">手机号</label>
                        <div class="phone-input-wrapper" id="phoneWrapper">
                            <span class="phone-prefix">+86</span>
                            <input
                                type="tel"
                                class="phone-input"
                                id="phoneInput"
                                placeholder="请输入手机号"
                                maxlength="11"
                                autocomplete="tel"
                            >
                        </div>
                        <div class="error-message" id="phoneError">请输入正确的11位手机号</div>
                    </div>

                    <!-- 验证码输入 -->
                    <div class="form-group">
                        <label class="form-label">验证码</label>
                        <div class="code-input-wrapper">
                            <input
                                type="text"
                                class="code-input"
                                id="codeInput"
                                placeholder="请输入验证码"
                                maxlength="6"
                                autocomplete="one-time-code"
                            >
                            <button
                                type="button"
                                class="send-code-btn"
                                id="sendCodeBtn"
                            >
                                发送验证码
                            </button>
                        </div>
                        <div class="error-message" id="codeError">请输入6位验证码</div>
                    </div>

                    <!-- 登录按钮 -->
                    <button type="submit" class="login-btn" id="loginBtn" disabled>
                        <span class="btn-text">立即登录</span>
                        <div class="spinner"></div>
                    </button>
                </form>

                <!-- 分割线 -->
                <div class="divider">
                    <span>或</span>
                </div>

                <!-- 微信扫码登录 -->
                <button class="wechat-btn" id="wechatBtn">
                    <svg class="wechat-icon" viewBox="0 0 24 24" fill="none">
                        <path d="M8.5 11C9.33 11 10 10.33 10 9.5C10 8.67 9.33 8 8.5 8C7.67 8 7 8.67 7 9.5C7 10.33 7.67 11 8.5 11Z" fill="#07C160"/>
                        <path d="M14.5 11C15.33 11 16 10.33 16 9.5C16 8.67 15.33 8 14.5 8C13.67 8 13 8.67 13 9.5C13 10.33 13.67 11 14.5 11Z" fill="#07C160"/>
                        <path d="M9 16C9 16 10 17 12 17C14 17 15 16 15 16" stroke="#07C160" stroke-width="1.5" stroke-linecap="round"/>
                        <path d="M12 2C6.48 2 2 5.92 2 10.5C2 12.84 3.22 14.93 5.16 16.35L4.5 19L7.5 17.5C8.84 17.82 10.26 18 12 18C17.52 18 22 14.08 22 9.5C22 5.92 17.52 2 12 2Z" fill="#07C160" fill-opacity="0.15" stroke="#07C160" stroke-width="1.5"/>
                    </svg>
                    微信扫码登录
                    <span class="wechat-badge">即将上线</span>
                </button>

                <!-- 协议勾选 -->
                <div class="agreement">
                    <input type="checkbox" id="agreeCheckbox">
                    <label class="agreement-text" for="agreeCheckbox">
                        登录即表示同意
                        <a href="#" class="agreement-link">《用户协议》</a>和
                        <a href="#" class="agreement-link">《隐私政策》</a>
                    </label>
                </div>

                <!-- 注册提示 -->
                <div class="register-hint">
                    还没有账号？
                    <a href="#" class="register-link">注册即送7天会员</a>
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script type="module">
        import { setAuth, isLoggedIn, mockLogin, mockSendCode } from './static/js/auth.js';

        // 如果已登录，直接跳转到 /home
        if (isLoggedIn()) {
            window.location.href = '/home';
        }

        // DOM 元素
        const phoneInput = document.getElementById('phoneInput');
        const codeInput = document.getElementById('codeInput');
        const sendCodeBtn = document.getElementById('sendCodeBtn');
        const loginBtn = document.getElementById('loginBtn');
        const agreeCheckbox = document.getElementById('agreeCheckbox');
        const phoneWrapper = document.getElementById('phoneWrapper');
        const phoneError = document.getElementById('phoneError');
        const codeError = document.getElementById('codeError');
        const successToast = document.getElementById('successToast');

        // 状态变量
        let countdown = 0;
        let countdownTimer = null;

        // 手机号验证
        function isValidPhone(phone) {
            return /^1[3-9]\d{9}$/.test(phone);
        }

        // 验证码验证
        function isValidCode(code) {
            return /^\d{6}$/.test(code);
        }

        // 更新登录按钮状态
        function updateLoginBtn() {
            const phone = phoneInput.value;
            const code = codeInput.value;
            const agreed = agreeCheckbox.checked;

            loginBtn.disabled = !(isValidPhone(phone) && isValidCode(code) && agreed);
        }

        // 显示错误
        function showError(element, message) {
            element.textContent = message;
            element.classList.add('show');
        }

        // 隐藏错误
        function hideError(element) {
            element.classList.remove('show');
        }

        // 发送验证码
        async function sendCode() {
            const phone = phoneInput.value;

            if (!isValidPhone(phone)) {
                phoneInput.parentElement.classList.add('input-error');
                showError(phoneError, '请输入正确的11位手机号');
                return;
            }

            hideError(phoneError);
            phoneInput.parentElement.classList.remove('input-error');

            // 禁用按钮，开始倒计时
            sendCodeBtn.disabled = true;
            countdown = 60;
            sendCodeBtn.textContent = `${countdown}秒后重试`;

            countdownTimer = setInterval(() => {
                countdown--;
                if (countdown <= 0) {
                    clearInterval(countdownTimer);
                    sendCodeBtn.disabled = false;
                    sendCodeBtn.textContent = '发送验证码';
                } else {
                    sendCodeBtn.textContent = `${countdown}秒后重试`;
                }
            }, 1000);

            // 调用发送验证码 API
            try {
                await mockSendCode(phone);
            } catch (error) {
                showError(phoneError, error.message || '发送失败，请重试');
                clearInterval(countdownTimer);
                sendCodeBtn.disabled = false;
                sendCodeBtn.textContent = '发送验证码';
            }
        }

        // 登录
        async function login() {
            const phone = phoneInput.value;
            const code = codeInput.value;

            // 验证
            if (!isValidPhone(phone)) {
                phoneInput.parentElement.classList.add('input-error');
                showError(phoneError, '请输入正确的11位手机号');
                return;
            }

            if (!isValidCode(code)) {
                codeInput.classList.add('input-error');
                showError(codeError, '请输入6位验证码');
                return;
            }

            if (!agreeCheckbox.checked) {
                alert('请先同意用户协议和隐私政策');
                return;
            }

            // 隐藏错误
            hideError(phoneError);
            hideError(codeError);
            phoneInput.parentElement.classList.remove('input-error');
            codeInput.classList.remove('input-error');

            // 显示 loading
            loginBtn.classList.add('loading');
            loginBtn.disabled = true;

            try {
                const result = await mockLogin(phone, code);

                // 保存登录信息
                setAuth(result.token, result.user);

                // 显示成功提示
                successToast.classList.add('show');

                // 1秒后跳转
                setTimeout(() => {
                    const urlParams = new URLSearchParams(window.location.search);
                    const redirect = urlParams.get('redirect') || '/home';
                    window.location.href = redirect;
                }, 1000);
            } catch (error) {
                showError(codeError, error.message || '登录失败，请重试');
                codeInput.classList.add('input-error');
            } finally {
                loginBtn.classList.remove('loading');
                updateLoginBtn();
            }
        }

        // 事件监听
        phoneInput.addEventListener('input', () => {
            // 只允许输入数字
            phoneInput.value = phoneInput.value.replace(/\D/g, '');
            hideError(phoneError);
            phoneInput.parentElement.classList.remove('input-error');
            updateLoginBtn();
        });

        codeInput.addEventListener('input', () => {
            // 只允许输入数字
            codeInput.value = codeInput.value.replace(/\D/g, '');
            hideError(codeError);
            codeInput.classList.remove('input-error');
            updateLoginBtn();
        });

        agreeCheckbox.addEventListener('change', updateLoginBtn);

        sendCodeBtn.addEventListener('click', sendCode);

        loginBtn.addEventListener('click', login);

        // 回车提交
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !loginBtn.disabled) {
                login();
            }
        });

        // 微信登录点击
        document.getElementById('wechatBtn').addEventListener('click', () => {
            alert('微信扫码登录即将上线，敬请期待！');
        });
    </script>
</body>
</html>
