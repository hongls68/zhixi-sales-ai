<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>团队协作 - 智析销售AI</title>
    <link rel="stylesheet" href="static/css/style.css">
    <style>
      .app-layout{display:flex;min-height:100vh;background:var(--bg-secondary)}
      .sidebar{width:240px;background:var(--bg-primary);border-right:1px solid var(--border-color);position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;z-index:100}
      .sidebar-logo{display:flex;align-items:center;gap:10px;padding:20px;border-bottom:1px solid var(--border-color)}
      .sidebar-logo img{width:28px;height:28px}.sidebar-logo span{font-size:var(--text-base);font-weight:700}
      .sidebar-nav{flex:1;padding:16px 12px;overflow-y:auto}
      .nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:var(--radius-md);font-size:var(--text-sm);color:var(--text-secondary);cursor:pointer;transition:all var(--transition-fast);margin-bottom:2px;text-decoration:none}
      .nav-item:hover{background:var(--gray-100);color:var(--text-primary)}
      .nav-item.active{background:var(--primary-50);color:var(--primary-600);font-weight:500}
      .nav-item svg{width:18px;height:18px;flex-shrink:0}
      .nav-section-title{font-size:var(--text-xs);font-weight:600;color:var(--text-tertiary);padding:8px 12px;text-transform:uppercase;letter-spacing:0.5px;margin-top:8px}
      .main-area{margin-left:240px;flex:1;display:flex;flex-direction:column}
      .topbar{height:56px;background:var(--bg-primary);border-bottom:1px solid var(--border-color);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:50}
      .content-area{flex:1;padding:24px;overflow-y:auto}
      .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
      .page-title{font-size:var(--text-2xl);font-weight:700;color:var(--text-primary)}
      .member-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;margin-bottom:32px}
      .member-card{background:var(--bg-primary);border:1px solid var(--border-color);border-radius:var(--radius-lg);padding:24px;text-align:center;transition:all var(--transition-base)}
      .member-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
      .member-avatar{width:64px;height:64px;border-radius:50%;background:var(--primary-100);display:flex;align-items:center;justify-content:center;font-size:var(--text-2xl);font-weight:700;color:var(--primary-600);margin:0 auto 16px}
      .member-name{font-size:var(--text-lg);font-weight:600;color:var(--text-primary);margin-bottom:4px}
      .member-role{font-size:var(--text-sm);color:var(--text-secondary);margin-bottom:16px}
      .member-stats{display:flex;justify-content:center;gap:24px;padding-top:16px;border-top:1px solid var(--border-color)}
      .member-stat{text-align:center}
      .member-stat-value{font-size:var(--text-lg);font-weight:700;color:var(--text-primary)}
      .member-stat-label{font-size:var(--text-xs);color:var(--text-tertiary)}
      .shared-reports{background:var(--bg-primary);border:1px solid var(--border-color);border-radius:var(--radius-lg)}
      .shared-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border-color)}
      .shared-title{font-size:var(--text-base);font-weight:600;color:var(--text-primary)}
      .shared-body{padding:20px}
      .shared-list{display:flex;flex-direction:column;gap:12px}
      .shared-item{display:flex;align-items:center;gap:16px;padding:14px;border:1px solid var(--border-color);border-radius:var(--radius-md);cursor:pointer;transition:all var(--transition-fast)}
      .shared-item:hover{border-color:var(--primary-300);box-shadow:var(--shadow-sm)}
      .shared-icon{width:40px;height:40px;border-radius:var(--radius-md);background:var(--primary-100);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
      .shared-info{flex:1}
      .shared-name{font-size:var(--text-sm);font-weight:600;color:var(--text-primary)}
      .shared-meta{font-size:var(--text-xs);color:var(--text-tertiary);margin-top:2px}
      .shared-from{font-size:var(--text-xs);color:var(--primary-500);background:var(--primary-50);padding:4px 10px;border-radius:10px}
      .add-member-card{border:2px dashed var(--border-color);background:transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;min-height:200px}
      .add-member-card:hover{border-color:var(--primary-400);background:var(--primary-50)}
      .add-icon{width:48px;height:48px;border-radius:50%;background:var(--gray-100);display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--text-tertiary);margin-bottom:12px}
      .add-text{font-size:var(--text-sm);color:var(--text-secondary)}
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <a href="/" class="sidebar-logo"><img src="static/images/logo.svg" alt="智析销售AI"><span>智析销售AI</span></a>
            <nav class="sidebar-nav">
                <div class="nav-section-title">主菜单</div>
                <a class="nav-item" href="dashboard.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>工作台</a>
                <a class="nav-item" href="history.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>分析记录</a>
                <a class="nav-item active" href="team.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle></svg>团队协作</a>
                <div class="nav-section-title">其他</div>
                <a class="nav-item" href="profile.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle></svg>设置</a>
            </nav>
        </aside>

        <div class="main-area">
            <header class="topbar">
                <div style="font-size:var(--text-lg);font-weight:600">团队协作</div>
            </header>

            <div class="content-area">
                <div class="page-header">
                    <div>
                        <h1 class="page-title">团队成员</h1>
                        <p style="font-size:var(--text-sm);color:var(--text-secondary);margin-top:4px">管理您的团队，共享分析结果</p>
                    </div>
                    <button class="btn btn-primary" onclick="showInviteModal()">+ 邀请成员</button>
                </div>

                <div class="member-grid" id="memberGrid">
                    <!-- 动态填充 -->
                </div>

                <div class="shared-reports">
                    <div class="shared-header">
                        <span class="shared-title">团队共享报告</span>
                        <span style="font-size:var(--text-sm);color:var(--text-tertiary)">最近7天</span>
                    </div>
                    <div class="shared-body">
                        <div class="shared-list" id="sharedList">
                            <!-- 动态填充 -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 邀请弹窗 -->
    <div class="modal-overlay" id="inviteModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">邀请团队成员</h3>
                <button class="modal-close" onclick="closeInviteModal()">✕</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">手机号</label>
                    <input type="tel" class="form-input" id="invitePhone" placeholder="输入成员手机号" maxlength="11">
                </div>
                <div class="form-group">
                    <label class="form-label">角色</label>
                    <select class="form-input" id="inviteRole">
                        <option value="member">成员</option>
                        <option value="admin">管理员</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeInviteModal()">取消</button>
                <button class="btn btn-primary" onclick="sendInvite()">发送邀请</button>
            </div>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script src="static/js/auth.js"></script>
    <script src="static/js/api.js"></script>
    <script src="static/js/utils.js"></script>
    <script>
        if(!window.auth.isLoggedIn()){window.location.href='login.html'}

        async function loadTeam(){
            const data=await window.api.mockGetTeamMembers();
            const grid=data.members.map(m=>`
                <div class="member-card">
                    <div class="member-avatar">${m.name.charAt(0)}</div>
                    <div class="member-name">${m.name}</div>
                    <div class="member-role">${m.role==='admin'?'管理员':'成员'}</div>
                    <div class="member-stats">
                        <div class="member-stat"><div class="member-stat-value">${Math.floor(Math.random()*50+10)}</div><div class="member-stat-label">分析次数</div></div>
                        <div class="member-stat"><div class="member-stat-value">${Math.floor(Math.random()*20+5)}</div><div class="member-stat-label">共享报告</div></div>
                    </div>
                </div>
            `).join('')+'<div class="member-card add-member-card" onclick="showInviteModal()"><div class="add-icon">+</div><div class="add-text">邀请新成员</div></div>';
            document.getElementById('memberGrid').innerHTML=grid;

            const shared=`
                <div class="shared-item"><div class="shared-icon">📞</div><div class="shared-info"><div class="shared-name">客户A沟通记录分析</div><div class="shared-meta">3小时前 · 张三</div></div><span class="shared-from">张三 分享</span></div>
                <div class="shared-item"><div class="shared-icon">🤝</div><div class="shared-info"><div class="shared-name">团队周会纪要</div><div class="shared-meta">昨天 · 李四</div></div><span class="shared-from">李四 分享</span></div>
                <div class="shared-item"><div class="shared-icon">📝</div><div class="shared-info"><div class="shared-name">客户需求调研</div><div class="shared-meta">2天前 · 王五</div></div><span class="shared-from">王五 分享</span></div>
            `;
            document.getElementById('sharedList').innerHTML=shared;
        }
        loadTeam();

        function showInviteModal(){document.getElementById('inviteModal').classList.add('active')}
        function closeInviteModal(){document.getElementById('inviteModal').classList.remove('active')}
        function sendInvite(){
            const phone=document.getElementById('invitePhone').value;
            if(phone.length!==11){window.utils.showToast('请输入正确的手机号','warning');return}
            closeInviteModal();
            window.utils.showToast('邀请已发送','success');
            document.getElementById('invitePhone').value='';
        }
    </script>
</body>
</html>
