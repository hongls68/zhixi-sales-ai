<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 智析销售AI</title>
    <link rel="stylesheet" href="static/css/style.css">
    <style>
      .login-page {
        min-height: 100vh;
        display: flex;
      }

      /* 左侧品牌区 */
      .login-brand {
        flex: 0 0 45%;
        background: linear-gradient(135deg, #1E40AF 0%, #3B82F6 50%, #60A5FA 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 60px;
        position: relative;
        overflow: hidden;
      }

      .login-brand::before {
        content: '';
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 50%);
        animation: float 6s ease-in-out infinite;
      }

      @keyframes float {
        0%, 100% { transform: translate(0, 0) rotate(0deg); }
        50% { transform: translate(-20px, -20px) rotate(5deg); }
      }

      .login-brand-content {
        position: relative;
        z-index: 1;
        text-align: center;
        color: white;
      }

      .login-brand-logo {
        width: 80px;
        height: 80px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 24px;
        backdrop-filter: blur(10px);
      }

      .login-brand-logo img {
        width: 48px;
        height: 48px;
      }

      .login-brand-name {
        font-size: var(--text-3xl);
        font-weight: 700;
        margin-bottom: 12px;
      }

      .login-brand-slogan {
        font-size: var(--text-lg);
        opacity: 0.9;
        margin-bottom: 32px;
      }

      .login-brand-features {
        text-align: left;
        max-width: 300px;
      }

      .login-brand-feature {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 16px;
        font-size: var(--text-sm);
        opacity: 0.9;
      }

      .login-brand-feature-icon {
        width: 24px;
        height: 24px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
      }

      /* 右侧表单区 */
      .login-form-section {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px;
        background: var(--bg-primary);
      }

      .login-form-container {
        width: 100%;
        max-width: 420px;
      }

      .login-form-header {
        margin-bottom: 36px;
      }

      .login-form-title {
        font-size: var(--text-2xl);
        font-weight: 700;
        color: var(--text-primary);
        margin-bottom: 8px;
      }

      .login-form-subtitle {
        font-size: var(--text-sm);
        color: var(--text-secondary);
      }

      .login-form-subtitle a {
        color: var(--primary-500);
        font-weight: 500;
      }

      /* 表单 */
      .login-form .form-group {
        margin-bottom: 20px;
      }

      .phone-input-group {
        display: flex;
        border: 1px solid var(--border-color);
        border-radius: var(--radius-md);
        overflow: hidden;
        transition: all var(--transition-fast);
      }

      .phone-input-group:focus-within {
        border-color: var(--primary-500);
        box-shadow: 0 0 0 3px var(--primary-100);
      }

      .phone-prefix {
        padding: 10px 14px;
        background: var(--gray-50);
        border-right: 1px solid var(--border-color);
        font-size: var(--text-sm);
        color: var(--text-secondary);
        font-weight: 500;
      }

      .phone-input-group input {
        flex: 1;
        border: none;
        padding: 10px 14px;
        font-size: var(--text-sm);
        outline: none;
      }

      .code-input-group {
        display: flex;
        gap: 12px;
      }

      .code-input-group input {
        flex: 1;
      }

      .code-input-group .btn {
        white-space: nowrap;
        min-width: 120px;
      }

      .form-options {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
      }

      .remember-me {
        display: flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
      }

      .remember-me input[type="checkbox"] {
        width: 16px;
        height: 16px;
        accent-color: var(--primary-500);
      }

      .remember-me label {
        font-size: var(--text-sm);
        color: var(--text-secondary);
        cursor: pointer;
      }

      .forgot-password {
        font-size: var(--text-sm);
        color: var(--primary-500);
      }

      /* 分割线 */
      .divider {
        display: flex;
        align-items: center;
        margin: 24px 0;
      }

      .divider::before,
      .divider::after {
        content: '';
        flex: 1;
        height: 1px;
        background: var(--border-color);
      }

      .divider span {
        padding: 0 16px;
        font-size: var(--text-sm);
        color: var(--text-tertiary);
      }

      /* 微信登录 */
      .wechat-login-btn {
        width: 100%;
        padding: 12px;
        background: var(--bg-primary);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-md);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        font-size: var(--text-sm);
        font-weight: 500;
        color: var(--text-primary);
        transition: all var(--transition-fast);
        position: relative;
      }

      .wechat-login-btn:hover {
        border-color: #07C160;
        background: #f0fdf4;
      }

      .wechat-icon {
        width: 24px;
        height: 24px;
      }

      .coming-soon-badge {
        position: absolute;
        top: -8px;
        right: 12px;
        background: var(--primary-500);
        color: white;
        font-size: 10px;
        padding: 2px 8px;
        border-radius: 10px;
      }

      /* 协议 */
      .agreement {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        margin-top: 24px;
      }

      .agreement input[type="checkbox"] {
        width: 16px;
        height: 16px;
        margin-top: 2px;
        accent-color: var(--primary-500);
        cursor: pointer;
      }

      .agreement-text {
        font-size: var(--text-xs);
        color: var(--text-tertiary);
        line-height: 1.6;
      }

      .agreement-text a {
        color: var(--primary-500);
      }

      /* 响应式 */
      @media (max-width: 1024px) {
        .login-brand {
          flex: 0 0 40%;
          padding: 40px;
        }
      }

      @media (max-width: 768px) {
        .login-page {
          flex-direction: column;
        }

        .login-brand {
          padding: 40px 20px;
          min-height: 200px;
        }

        .login-brand-features {
          display: none;
        }

        .login-form-section {
          padding: 30px 20px;
        }
      }
    </style>
</head>
<body>
    <div class="login-page">
        <!-- 左侧品牌区 -->
        <div class="login-brand">
            <div class="login-brand-content">
                <div class="login-brand-logo">
                    <img src="static/images/logo.svg" alt="智析销售AI">
                </div>
                <h1 class="login-brand-name">智析销售AI</h1>
                <p class="login-brand-slogan">智能销售分析平台</p>

                <div class="login-brand-features">
                    <div class="login-brand-feature">
                        <div class="login-brand-feature-icon">✓</div>
                        <span>AI驱动的对话分析</span>
                    </div>
                    <div class="login-brand-feature">
                        <div class="login-brand-feature-icon">✓</div>
                        <span>精准客户意图识别</span>
                    </div>
                    <div class="login-brand-feature">
                        <div class="login-brand-feature-icon">✓</div>
                        <span>团队协作与共享</span>
                    </div>
                    <div class="login-brand-feature">
                        <div class="login-brand-feature-icon">✓</div>
                        <span>专业报告导出</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 右侧表单区 -->
        <div class="login-form-section">
            <div class="login-form-container">
                <div class="login-form-header">
                    <h2 class="login-form-title">欢迎回来</h2>
                    <p class="login-form-subtitle">
                        还没有账号？<a href="register.html">立即注册</a>
                    </p>
                </div>

                <form class="login-form" id="loginForm" onsubmit="return false;">
                    <!-- 手机号 -->
                    <div class="form-group">
                        <label class="form-label">手机号</label>
                        <div class="phone-input-group" id="phoneGroup">
                            <span class="phone-prefix">+86</span>
                            <input
                                type="tel"
                                id="phoneInput"
                                placeholder="请输入手机号"
                                maxlength="11"
                                autocomplete="tel"
                            >
                        </div>
                        <div class="form-error" id="phoneError" style="display: none;"></div>
                    </div>

                    <!-- 验证码 -->
                    <div class="form-group">
                        <label class="form-label">验证码</label>
                        <div class="code-input-group">
                            <input
                                type="text"
                                id="codeInput"
                                placeholder="请输入验证码"
                                maxlength="6"
                                autocomplete="one-time-code"
                            >
                            <button
                                type="button"
                                class="btn btn-secondary"
                                id="sendCodeBtn"
                            >
                                发送验证码
                            </button>
                        </div>
                        <div class="form-error" id="codeError" style="display: none;"></div>
                    </div>

                    <!-- 选项 -->
                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" id="rememberMe" checked>
                            <label for="rememberMe">7天内免登录</label>
                        </label>
                        <a href="#" class="forgot-password">忘记密码？</a>
                    </div>

                    <!-- 登录按钮 -->
                    <button type="submit" class="btn btn-primary btn-lg btn-block" id="loginBtn" disabled>
                        <span class="btn-text">登录</span>
                        <div class="spinner" style="display: none;"></div>
                    </button>
                </form>

                <!-- 分割线 -->
                <div class="divider">
                    <span>其他登录方式</span>
                </div>

                <!-- 微信登录 -->
                <button class="wechat-login-btn" id="wechatBtn">
                    <svg class="wechat-icon" viewBox="0 0 24 24" fill="none">
                        <path d="M8.5 11C9.33 11 10 10.33 10 9.5C10 8.67 9.33 8 8.5 8C7.67 8 7 8.67 7 9.5C7 10.33 7.67 11 8.5 11Z" fill="#07C160"/>
                        <path d="M14.5 11C15.33 11 16 10.33 16 9.5C16 8.67 15.33 8 14.5 8C13.67 8 13 8.67 13 9.5C13 10.33 13.67 11 14.5 11Z" fill="#07C160"/>
                        <path d="M12 2C6.48 2 2 5.92 2 10.5C2 12.84 3.22 14.93 5.16 16.35L4.5 19L7.5 17.5C8.84 17.82 10.26 18 12 18C17.52 18 22 14.08 22 9.5C22 5.92 17.52 2 12 2Z" fill="#07C160" fill-opacity="0.15" stroke="#07C160" stroke-width="1.5"/>
                    </svg>
                    微信扫码登录
                    <span class="coming-soon-badge">即将上线</span>
                </button>

                <!-- 协议 -->
                <div class="agreement">
                    <input type="checkbox" id="agreeCheckbox">
                    <label class="agreement-text" for="agreeCheckbox">
                        登录即表示同意
                        <a href="#">《用户协议》</a>和
                        <a href="#">《隐私政策》</a>
                    </label>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast容器 -->
    <div id="toast-container" class="toast-container"></div>

    <script src="static/js/auth.js"></script>
    <script src="static/js/utils.js"></script>
    <script>
        // 如果已登录，跳转到工作台
        if (window.auth.isLoggedIn()) {
            var params = new URLSearchParams(window.location.search);
            window.location.href = params.get('redirect') || 'dashboard.html';
        }

        // DOM元素
        var phoneInput = document.getElementById('phoneInput');
        var codeInput = document.getElementById('codeInput');
        var sendCodeBtn = document.getElementById('sendCodeBtn');
        var loginBtn = document.getElementById('loginBtn');
        var agreeCheckbox = document.getElementById('agreeCheckbox');
        var phoneGroup = document.getElementById('phoneGroup');
        var phoneError = document.getElementById('phoneError');
        var codeError = document.getElementById('codeError');

        var countdown = 0;
        var countdownTimer = null;

        // 验证函数
        function isValidPhone(phone) {
            return /^1[3-9]\d{9}$/.test(phone);
        }

        function isValidCode(code) {
            return /^\d{6}$/.test(code);
        }

        // 更新按钮状态
        function updateLoginBtn() {
            var phone = phoneInput.value;
            var code = codeInput.value;
            var agreed = agreeCheckbox.checked;
            loginBtn.disabled = !(isValidPhone(phone) && isValidCode(code) && agreed);
        }

        // 显示/隐藏错误
        function showError(element, message) {
            element.textContent = message;
            element.style.display = 'block';
        }

        function hideError(element) {
            element.style.display = 'none';
        }

        // 实时验证 - 手机号
        phoneInput.addEventListener('input', function() {
            this.value = this.value.replace(/\D/g, '');
            hideError(phoneError);
            phoneGroup.style.borderColor = '';
            if (this.value.length === 11 && !isValidPhone(this.value)) {
                phoneGroup.style.borderColor = '#EF4444';
                showError(phoneError, '请输入正确的手机号');
            } else if (this.value.length === 11 && isValidPhone(this.value)) {
                phoneGroup.style.borderColor = '#10B981';
            }
            updateLoginBtn();
        });

        // 实时验证 - 验证码
        codeInput.addEventListener('input', function() {
            this.value = this.value.replace(/\D/g, '');
            hideError(codeError);
            this.style.borderColor = '';
            if (this.value.length === 6 && !isValidCode(this.value)) {
                this.style.borderColor = '#EF4444';
                showError(codeError, '验证码为6位数字');
            } else if (this.value.length === 6) {
                this.style.borderColor = '#10B981';
            }
            updateLoginBtn();
        });

        agreeCheckbox.addEventListener('change', updateLoginBtn);

        // 发送验证码
        function sendCode() {
            var phone = phoneInput.value;

            if (!isValidPhone(phone)) {
                phoneGroup.style.borderColor = '#EF4444';
                showError(phoneError, '请输入正确的11位手机号');
                return;
            }

            hideError(phoneError);
            phoneGroup.style.borderColor = '';

            sendCodeBtn.disabled = true;
            countdown = 60;
            sendCodeBtn.textContent = countdown + '秒后重试';

            countdownTimer = setInterval(function() {
                countdown--;
                if (countdown <= 0) {
                    clearInterval(countdownTimer);
                    sendCodeBtn.disabled = false;
                    sendCodeBtn.textContent = '发送验证码';
                } else {
                    sendCodeBtn.textContent = countdown + '秒后重试';
                }
            }, 1000);

            window.auth.mockSendCode(phone).then(function() {
                window.utils.showToast('验证码已发送', 'success');
            }).catch(function(error) {
                showError(phoneError, error.message);
                clearInterval(countdownTimer);
                sendCodeBtn.disabled = false;
                sendCodeBtn.textContent = '发送验证码';
            });
        }

        // 登录
        function login() {
            var phone = phoneInput.value;
            var code = codeInput.value;

            if (!isValidPhone(phone)) {
                phoneGroup.style.borderColor = '#EF4444';
                showError(phoneError, '请输入正确的11位手机号');
                return;
            }

            if (!isValidCode(code)) {
                codeInput.style.borderColor = '#EF4444';
                showError(codeError, '请输入6位验证码');
                return;
            }

            if (!agreeCheckbox.checked) {
                window.utils.showToast('请先同意用户协议', 'warning');
                return;
            }

            hideError(phoneError);
            hideError(codeError);
            phoneGroup.style.borderColor = '';
            codeInput.style.borderColor = '';

            // Loading状态
            loginBtn.disabled = true;
            loginBtn.querySelector('.btn-text').style.display = 'none';
            loginBtn.querySelector('.btn-text').style.display = 'none';
            loginBtn.querySelector('.spinner').style.display = 'block';

            window.auth.mockLogin(phone, code).then(function(result) {
                window.auth.setAuth(result.token, result.user);
                window.utils.showToast('登录成功', 'success');

                setTimeout(function() {
                    var params = new URLSearchParams(window.location.search);
                    window.location.href = params.get('redirect') || 'dashboard.html';
                }, 1000);
            }).catch(function(error) {
                showError(codeError, error.message);
                codeInput.style.borderColor = '#EF4444';
            }).finally(function() {
                loginBtn.querySelector('.btn-text').style.display = 'block';
                loginBtn.querySelector('.spinner').style.display = 'none';
                updateLoginBtn();
            });
        }

        // 事件监听
        sendCodeBtn.addEventListener('click', sendCode);
        loginBtn.addEventListener('click', login);

        // 回车提交
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !loginBtn.disabled) {
                login();
            }
        });

        // 微信登录
        document.getElementById('wechatBtn').addEventListener('click', function() {
            window.utils.showToast('微信扫码登录即将上线', 'info');
        });

        // 初始化
        updateLoginBtn();
    </script>
</body>
</html>
