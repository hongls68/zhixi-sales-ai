<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工作台 - 智析销售AI</title>
    <link rel="stylesheet" href="static/css/style.css">
    <style>
      .dashboard{display:flex;min-height:100vh;background:var(--bg-secondary)}
      .sidebar{width:240px;background:var(--bg-primary);border-right:1px solid var(--border-color);position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;z-index:100}
      .sidebar-logo{display:flex;align-items:center;gap:10px;padding:20px;border-bottom:1px solid var(--border-color)}
      .sidebar-logo img{width:28px;height:28px}
      .sidebar-logo span{font-size:var(--text-base);font-weight:700;color:var(--text-primary)}
      .sidebar-nav{flex:1;padding:16px 12px;overflow-y:auto}
      .nav-section{margin-bottom:8px}
      .nav-section-title{font-size:var(--text-xs);font-weight:600;color:var(--text-tertiary);padding:8px 12px;text-transform:uppercase;letter-spacing:0.5px}
      .nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:var(--radius-md);font-size:var(--text-sm);color:var(--text-secondary);cursor:pointer;transition:all var(--transition-fast);margin-bottom:2px;text-decoration:none}
      .nav-item:hover{background:var(--gray-100);color:var(--text-primary)}
      .nav-item.active{background:var(--primary-50);color:var(--primary-600);font-weight:500}
      .nav-item svg{width:18px;height:18px;flex-shrink:0}
      .admin-only{display:none!important}
      .admin-only.show{display:flex!important}
      .sidebar-user{padding:16px;border-top:1px solid var(--border-color);display:flex;align-items:center;gap:12px}
      .user-avatar-sm{width:36px;height:36px;border-radius:50%;background:var(--primary-100);display:flex;align-items:center;justify-content:center;font-weight:600;color:var(--primary-600);font-size:var(--text-sm);flex-shrink:0}
      .user-info-sm{flex:1;overflow:hidden}
      .user-name-sm{font-size:var(--text-sm);font-weight:600;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
      .user-role-sm{font-size:var(--text-xs);color:var(--text-tertiary)}
      .main-area{margin-left:240px;flex:1;display:flex;flex-direction:column}
      .topbar{height:56px;background:var(--bg-primary);border-bottom:1px solid var(--border-color);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:50}
      .topbar-left{display:flex;align-items:center;gap:16px}
      .page-title-bar{font-size:var(--text-lg);font-weight:600;color:var(--text-primary)}
      .topbar-right{display:flex;align-items:center;gap:16px}
      .topbar-btn{width:36px;height:36px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;color:var(--text-secondary);transition:all var(--transition-fast);position:relative}
      .topbar-btn:hover{background:var(--gray-100);color:var(--text-primary)}
      .notification-dot{position:absolute;top:6px;right:6px;width:8px;height:8px;background:var(--error);border-radius:50%;border:2px solid var(--bg-primary)}
      .content-area{flex:1;padding:24px;overflow-y:auto}
      .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:24px}
      .stat-card{background:var(--bg-primary);border:1px solid var(--border-color);border-radius:var(--radius-lg);padding:20px;transition:all var(--transition-base)}
      .stat-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
      .stat-icon{width:44px;height:44px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;margin-bottom:16px;font-size:22px}
      .stat-icon.blue{background:var(--primary-100)}
      .stat-icon.green{background:var(--success-light)}
      .stat-icon.orange{background:var(--warning-light)}
      .stat-icon.purple{background:#EDE9FE}
      .stat-value{font-size:var(--text-2xl);font-weight:700;color:var(--text-primary);margin-bottom:4px}
      .stat-label{font-size:var(--text-sm);color:var(--text-secondary)}
      .stat-trend{display:flex;align-items:center;gap:4px;margin-top:8px;font-size:var(--text-xs)}
      .stat-trend.up{color:var(--success)}
      .stat-trend.down{color:var(--error)}
      .section-card{background:var(--bg-primary);border:1px solid var(--border-color);border-radius:var(--radius-lg);margin-bottom:24px}
      .section-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border-color)}
      .section-title{font-size:var(--text-base);font-weight:600;color:var(--text-primary)}
      .section-body{padding:20px}
      .upload-area{border:2px dashed var(--border-color);border-radius:var(--radius-lg);padding:48px;text-align:center;cursor:pointer;transition:all var(--transition-base);background:var(--bg-secondary)}
      .upload-area:hover{border-color:var(--primary-400);background:var(--primary-50)}
      .upload-icon{font-size:48px;margin-bottom:16px}
      .upload-title{font-size:var(--text-lg);font-weight:600;color:var(--text-primary);margin-bottom:8px}
      .upload-hint{font-size:var(--text-sm);color:var(--text-secondary)}
      .history-list{display:flex;flex-direction:column;gap:12px}
      .history-item{display:flex;align-items:center;gap:16px;padding:16px;border:1px solid var(--border-color);border-radius:var(--radius-md);cursor:pointer;transition:all var(--transition-fast)}
      .history-item:hover{border-color:var(--primary-300);box-shadow:var(--shadow-sm)}
      .history-icon{width:40px;height:40px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;font-size:20px;background:var(--primary-100);flex-shrink:0}
      .history-info{flex:1;min-width:0}
      .history-title{font-size:var(--text-sm);font-weight:600;color:var(--text-primary);margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
      .history-meta{font-size:var(--text-xs);color:var(--text-tertiary);display:flex;gap:12px}
      .history-score{font-size:var(--text-lg);font-weight:700;flex-shrink:0}
      .history-badge{padding:4px 10px;border-radius:12px;font-size:var(--text-xs);font-weight:500;flex-shrink:0}
      .badge-completed{background:var(--success-light);color:var(--success)}
      .badge-processing{background:var(--warning-light);color:var(--warning)}
      .quick-actions{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
      .quick-action{display:flex;flex-direction:column;align-items:center;gap:10px;padding:20px;border:1px solid var(--border-color);border-radius:var(--radius-md);cursor:pointer;transition:all var(--transition-fast);text-align:center}
      .quick-action:hover{border-color:var(--primary-300);background:var(--primary-50)}
      .quick-action-icon{font-size:28px}
      .quick-action-text{font-size:var(--text-sm);font-weight:500;color:var(--text-primary)}
      @media(max-width:1024px){.stats-grid{grid-template-columns:repeat(2,1fr)}.quick-actions{grid-template-columns:repeat(2,1fr)}}
    </style>
</head>
<body>
    <div class="dashboard">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <a href="/" class="sidebar-logo">
                <img src="static/images/logo.svg" alt="智析销售AI">
                <span>智析销售AI</span>
            </a>

            <nav class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-section-title">主菜单</div>
                    <a class="nav-item active" href="dashboard.html">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                        工作台
                    </a>
                    <a class="nav-item" href="history.html">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line></svg>
                        分析记录
                    </a>
                    <a class="nav-item" href="team.html">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                        团队协作
                    </a>
                </div>
                <div class="nav-section">
                    <div class="nav-section-title">其他</div>
                    <!-- 管理员入口（仅管理员可见） -->
                    <a class="nav-item admin-only" href="admin.html" id="adminNav">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"></path><path d="M2 17l10 5 10-5"></path><path d="M2 12l10 5 10-5"></path></svg>
                        管理后台
                    </a>
                    <a class="nav-item" href="profile.html">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle></svg>
                        设置
                    </a>
                    <a class="nav-item" href="#" id="logoutBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                        退出登录
                    </a>
                </div>
            </nav>

            <div class="sidebar-user">
                <div class="user-avatar-sm" id="sidebarAvatar">U</div>
                <div class="user-info-sm">
                    <div class="user-name-sm" id="sidebarName">用户</div>
                    <div class="user-role-sm">免费版</div>
                </div>
            </div>
        </aside>

        <!-- 主区域 -->
        <div class="main-area">
            <header class="topbar">
                <div class="topbar-left">
                    <h1 class="page-title-bar" id="pageTitle">工作台</h1>
                </div>
                <div class="topbar-right">
                    <button class="topbar-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                        <span class="notification-dot"></span>
                    </button>
                </div>
            </header>

            <div class="content-area">
                <!-- 统计卡片 -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon blue">📊</div>
                        <div class="stat-value" id="totalAnalyses">156</div>
                        <div class="stat-label">总分析次数</div>
                        <div class="stat-trend up">↑ 12% 较上月</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon green">📈</div>
                        <div class="stat-value" id="monthAnalyses">23</div>
                        <div class="stat-label">本月分析</div>
                        <div class="stat-trend up">↑ 8% 较上月</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon orange">🎯</div>
                        <div class="stat-value" id="avgScore">82</div>
                        <div class="stat-label">平均评分</div>
                        <div class="stat-trend up">↑ 3分 较上月</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon purple">👥</div>
                        <div class="stat-value" id="teamMembers">5</div>
                        <div class="stat-label">团队成员</div>
                        <div class="stat-trend">— 本月无变化</div>
                    </div>
                </div>

                <!-- 趋势图 -->
                <div class="section-card" style="margin-bottom:24px;">
                    <div class="section-header">
                        <span class="section-title">📈 最近7天分析趋势</span>
                    </div>
                    <div class="section-body" style="height:250px;">
                        <canvas id="trendChart"></canvas>
                    </div>
                </div>

                <!-- 快速操作 + 上传区 -->
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px;">
                    <div class="section-card">
                        <div class="section-header">
                            <span class="section-title">快速开始</span>
                        </div>
                        <div class="section-body">
                            <div class="quick-actions">
                                <div class="quick-action" onclick="document.getElementById('fileInput').click()">
                                    <div class="quick-action-icon">🎤</div>
                                    <div class="quick-action-text">上传录音</div>
                                </div>
                                <div class="quick-action" onclick="showTextInput()">
                                    <div class="quick-action-icon">📝</div>
                                    <div class="quick-action-text">粘贴文本</div>
                                </div>
                                <div class="quick-action" onclick="window.location.href='history.html'">
                                    <div class="quick-action-icon">📋</div>
                                    <div class="quick-action-text">查看历史</div>
                                </div>
                            </div>
                            <input type="file" id="fileInput" accept="audio/*,.txt" style="display:none">
                        </div>
                    </div>

                    <div class="section-card">
                        <div class="section-header">
                            <span class="section-title">上传分析</span>
                        </div>
                        <div class="section-body">
                            <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                                <div class="upload-icon">📁</div>
                                <div class="upload-title">拖拽文件到此处或点击上传</div>
                                <div class="upload-hint">支持 MP3、WAV、TXT 格式，最大 50MB</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 最近分析 -->
                <div class="section-card">
                    <div class="section-header">
                        <span class="section-title">最近分析</span>
                        <a href="history.html" class="btn btn-ghost btn-sm">查看全部 →</a>
                    </div>
                    <div class="section-body" id="recentList">
                        <!-- 动态填充 -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 文本输入弹窗 -->
    <div class="modal-overlay" id="textModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">粘贴对话内容</h3>
                <button class="modal-close" onclick="closeTextModal()">✕</button>
            </div>
            <div class="modal-body">
                <textarea class="form-input" id="textInput" rows="10" placeholder="请粘贴销售对话或会议记录内容..."></textarea>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeTextModal()">取消</button>
                <button class="btn btn-primary" onclick="analyzeText()">开始分析</button>
            </div>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="static/js/auth.js"></script>
    <script src="static/js/api.js"></script>
    <script src="static/js/utils.js"></script>
    <script>
        // 登录守卫
        if(!window.auth.isLoggedIn()){window.location.href='login.html?redirect=dashboard.html';}

        // 用户信息
        var user = window.auth.getUserInfo();
        var name = user.nickname || user.phone || user.username || '用户';
        document.getElementById('sidebarAvatar').textContent = name.charAt(0);
        document.getElementById('sidebarName').textContent = name;

        // 检查并修复角色信息（支持 phone 或 username 为 admin）
        var isAdmin = (user.phone === 'admin' || user.username === 'admin' || user.role === 'admin');
        if (isAdmin && user.role !== 'admin') {
            user.role = 'admin';
            user.nickname = '管理员';
            window.auth.setAuth(localStorage.getItem('zhixi_token'), user);
        }

        document.querySelector('.user-role-sm').textContent = isAdmin ? '管理员' : '免费版';

        // 管理员显示管理后台入口
        if (isAdmin) {
            var adminNav = document.getElementById('adminNav');
            if (adminNav) {
                adminNav.classList.add('show');
            }
        }

        // 退出登录
        document.getElementById('logoutBtn').onclick = function() {
            window.utils.showConfirm('退出登录', '确定要退出登录吗？').then(function(ok) {
                if (ok) window.auth.logout();
            });
        };

        // 数字滚动动画
        window.utils.animateNumber(document.getElementById('totalAnalyses'), 156, 1000);
        window.utils.animateNumber(document.getElementById('monthAnalyses'), 23, 800);
        window.utils.animateNumber(document.getElementById('avgScore'), 82, 900);
        window.utils.animateNumber(document.getElementById('teamMembers'), 5, 600);

        // Chart.js 趋势图
        var trendCtx = document.getElementById('trendChart');
        if (trendCtx && typeof Chart !== 'undefined') {
            new Chart(trendCtx.getContext('2d'), {
                type: 'line',
                data: {
                    labels: ['06-18', '06-19', '06-20', '06-21', '06-22', '06-23', '06-24'],
                    datasets: [{
                        label: '分析次数',
                        data: [3, 5, 2, 4, 6, 3, 4],
                        borderColor: '#3B82F6',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        tension: 0.4,
                        fill: true,
                        pointBackgroundColor: '#3B82F6',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2,
                        pointRadius: 5,
                        pointHoverRadius: 7
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, ticks: { stepSize: 2 }, grid: { color: 'rgba(0,0,0,0.05)' } },
                        x: { grid: { display: false } }
                    }
                }
            });
        }

        // 加载最近分析
        function loadRecent() {
            var listEl = document.getElementById('recentList');
            listEl.innerHTML = window.utils.getSkeletonHTML(3);

            window.api.getAnalysisList().then(function(data) {
                if (data.list.length === 0) {
                    listEl.innerHTML = window.utils.getEmptyStateHTML('📭', '暂无分析记录', '上传录音或粘贴对话，开始您的第一次AI分析', '开始分析', 'javascript:showTextInput()');
                    return;
                }

                var html = '<div class="history-list">';
                data.list.forEach(function(item) {
                    var statusBadge = item.status === 'completed' ? '<span class="history-badge badge-completed">已完成</span>' : '<span class="history-badge badge-processing">分析中</span>';
                    var score = item.score ? '<div class="history-score" style="color:' + window.utils.getScoreColor(item.score) + '">' + item.score + '</div>' : '<div class="history-score" style="color:var(--text-tertiary)">--</div>';
                    var icon = item.type === 'sales_call' ? '📞' : (item.type === 'meeting' ? '🤝' : '📝');

                    html += '<div class="history-item" onclick="window.location.href=\'analysis.html?id=' + item.id + '\'" style="animation:fadeInUp 0.3s ease ' + (data.list.indexOf(item) * 0.1) + 's both">';
                    html += '<div class="history-icon">' + icon + '</div>';
                    html += '<div class="history-info"><div class="history-title">' + item.title + '</div>';
                    html += '<div class="history-meta"><span>' + window.utils.getAnalysisTypeName(item.type) + '</span><span>' + window.utils.timeAgo(item.created_at) + '</span></div></div>';
                    html += score + statusBadge + '</div>';
                });
                html += '</div>';
                listEl.innerHTML = html;
            }).catch(function() {
                listEl.innerHTML = window.utils.getEmptyStateHTML('❌', '加载失败', '请检查网络连接后重试', '刷新', 'javascript:loadRecent()');
            });
        }
        loadRecent();

        // 文本输入
        function showTextInput() {
            document.getElementById('textModal').classList.add('active');
        }
        function closeTextModal() {
            document.getElementById('textModal').classList.remove('active');
        }

        function analyzeText() {
            var text = document.getElementById('textInput').value.trim();
            if (!text) {
                window.utils.showToast('请输入对话内容', 'warning');
                return;
            }
            closeTextModal();
            window.utils.showToast('正在分析...', 'info');

            window.api.createAnalysis(text, '销售对话分析', 'sales_call').then(function(result) {
                window.utils.showToast('分析完成', 'success');
                window.location.href = 'analysis.html?id=' + result.id;
            }).catch(function(err) {
                window.utils.showToast('分析失败: ' + (err.message || '未知错误'), 'error');
            });
        }
    </script>
</body>
</html>
