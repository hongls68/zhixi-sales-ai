<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分析记录 - 智析销售AI</title>
    <link rel="stylesheet" href="static/css/style.css">
    <style>
      .app-layout{display:flex;min-height:100vh;background:var(--bg-secondary)}
      .sidebar{width:240px;background:var(--bg-primary);border-right:1px solid var(--border-color);position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;z-index:100}
      .sidebar-logo{display:flex;align-items:center;gap:10px;padding:20px;border-bottom:1px solid var(--border-color);text-decoration:none}
      .sidebar-logo img{width:28px;height:28px}.sidebar-logo span{font-size:var(--text-base);font-weight:700;color:var(--text-primary)}
      .sidebar-nav{flex:1;padding:16px 12px;overflow-y:auto}
      .nav-section-title{font-size:var(--text-xs);font-weight:600;color:var(--text-tertiary);padding:8px 12px;text-transform:uppercase;letter-spacing:0.5px;margin-top:8px}
      .nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:var(--radius-md);font-size:var(--text-sm);color:var(--text-secondary);cursor:pointer;transition:all var(--transition-fast);margin-bottom:2px;text-decoration:none}
      .nav-item:hover{background:var(--gray-100);color:var(--text-primary)}
      .nav-item.active{background:var(--primary-50);color:var(--primary-600);font-weight:500}
      .nav-item svg{width:18px;height:18px;flex-shrink:0}
      .main-area{margin-left:240px;flex:1;display:flex;flex-direction:column}
      .topbar{height:56px;background:var(--bg-primary);border-bottom:1px solid var(--border-color);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:50}
      .content-area{flex:1;padding:24px}

      /* 搜索栏 */
      .search-section{display:flex;gap:12px;margin-bottom:24px}
      .search-input{flex:1;padding:12px 16px;border:2px solid var(--border-color);border-radius:var(--radius-lg);font-size:var(--text-base);transition:border-color var(--transition-fast)}
      .search-input:focus{outline:none;border-color:var(--primary-500);box-shadow:0 0 0 3px var(--primary-100)}

      /* 记录列表 */
      .history-list{display:flex;flex-direction:column;gap:16px}
      .history-card{background:var(--bg-primary);border:1px solid var(--border-color);border-radius:var(--radius-lg);padding:20px;cursor:pointer;transition:all var(--transition-fast);display:flex;align-items:center;gap:16px}
      .history-card:hover{box-shadow:var(--shadow-md);border-color:var(--primary-300);transform:translateY(-2px)}
      .history-icon{width:48px;height:48px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;font-size:24px;background:var(--primary-100);flex-shrink:0}
      .history-info{flex:1;min-width:0}
      .history-title{font-size:var(--text-base);font-weight:600;color:var(--text-primary);margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
      .history-meta{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
      .history-type{padding:4px 10px;border-radius:var(--radius-sm);font-size:var(--text-xs);background:var(--gray-100);color:var(--text-secondary)}
      .history-time{font-size:var(--text-xs);color:var(--text-tertiary)}
      .history-intent{flex-shrink:0}
      .history-actions{display:flex;gap:8px;flex-shrink:0}

      /* 意向度标签 */
      .intent-tag{padding:6px 14px;border-radius:var(--radius-lg);font-weight:600;font-size:var(--text-sm)}
      .intent-high{background:#dcfce7;color:#166534}
      .intent-medium{background:#fef3c7;color:#92400e}
      .intent-low{background:#fee2e2;color:#991b1b}

      /* 空状态 */
      .empty-state{text-align:center;padding:80px 20px}
      .empty-icon{font-size:64px;margin-bottom:16px}
      .empty-title{font-size:var(--text-xl);font-weight:600;color:var(--text-primary);margin-bottom:8px}
      .empty-desc{font-size:var(--text-sm);color:var(--text-secondary);margin-bottom:24px}

      /* 详情弹窗 */
      .detail-modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:2000;align-items:center;justify-content:center}
      .detail-modal.active{display:flex}
      .detail-content{background:var(--bg-primary);border-radius:var(--radius-xl);max-width:700px;width:90%;max-height:90vh;overflow-y:auto;padding:32px}
      .detail-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border-color)}
      .detail-title{font-size:var(--text-xl);font-weight:700}
      .detail-close{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;background:var(--gray-100);transition:background var(--transition-fast);font-size:18px}
      .detail-close:hover{background:var(--gray-200)}
      .detail-section{margin-bottom:24px}
      .detail-section-title{font-size:var(--text-base);font-weight:600;color:var(--text-primary);margin-bottom:12px;display:flex;align-items:center;gap:8px}
      .detail-text{font-size:var(--text-sm);color:var(--text-secondary);line-height:1.8;white-space:pre-wrap}
      .detail-list{list-style:disc;padding-left:20px}
      .detail-list li{font-size:var(--text-sm);color:var(--text-secondary);margin-bottom:8px;line-height:1.6}
      .detail-original{background:var(--bg-secondary);padding:16px;border-radius:var(--radius-md);font-size:var(--text-sm);color:var(--text-primary);line-height:1.8;white-space:pre-wrap;max-height:200px;overflow-y:auto}

      @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

      @media(max-width:768px){
        .sidebar{display:none}.main-area{margin-left:0}
        .history-card{flex-direction:column;align-items:flex-start}
        .history-actions{width:100%;justify-content:flex-end}
      }
    </style>
</head>
<body>
    <div class="app-layout">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <a href="/" class="sidebar-logo">
                <img src="static/images/logo.svg" alt="智析销售AI">
                <span>智析销售AI</span>
            </a>
            <nav class="sidebar-nav">
                <div class="nav-section-title">主菜单</div>
                <a class="nav-item" href="app.html#dashboard"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>工作台</a>
                <a class="nav-item" href="analyze.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>新建分析</a>
                <a class="nav-item active" href="history.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>分析记录</a>
                <a class="nav-item" href="app.html#team"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle></svg>团队协作</a>
                <div class="nav-section-title">其他</div>
                <a class="nav-item" href="app.html#profile"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle></svg>设置</a>
            </nav>
        </aside>

        <!-- 主内容区 -->
        <div class="main-area">
            <header class="topbar">
                <div style="display:flex;align-items:center;gap:16px">
                    <a href="app.html" class="btn btn-ghost btn-sm">← 返回工作台</a>
                    <h1 style="font-size:var(--text-lg);font-weight:600">分析记录</h1>
                </div>
                <a href="analyze.html" class="btn btn-primary">+ 新建分析</a>
            </header>

            <div class="content-area">
                <!-- 搜索栏 -->
                <div class="search-section">
                    <input type="text" class="search-input" id="searchInput" placeholder="搜索分析记录..." oninput="filterHistory()">
                </div>

                <!-- 记录列表 -->
                <div class="history-list" id="historyList">
                    <!-- 动态填充 -->
                </div>
            </div>
        </div>
    </div>

    <!-- 详情弹窗 -->
    <div class="detail-modal" id="detailModal">
        <div class="detail-content">
            <div class="detail-header">
                <h3 class="detail-title" id="detailTitle">分析详情</h3>
                <div class="detail-close" onclick="closeDetailModal()">✕</div>
            </div>
            <div id="detailBody"></div>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script src="static/js/auth.js"></script>
    <script src="static/js/utils.js"></script>
    <script>
        // 检查登录状态
        if (window.auth && !window.auth.isLoggedIn()) {
            window.location.href = 'login.html';
        }

        var allHistory = [];

        // 加载历史记录 - 从API获取
        function loadHistory() {
            var listEl = document.getElementById('historyList');
            listEl.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-secondary)">加载中...</div>';

            if (window.api) {
                window.api.getAnalysisList().then(function(data) {
                    allHistory = data.list || [];
                    renderHistory(allHistory);
                }).catch(function() {
                    // 如果API失败，尝试从localStorage加载
                    allHistory = JSON.parse(localStorage.getItem('analysis_history') || '[]');
                    renderHistory(allHistory);
                });
            } else {
                allHistory = JSON.parse(localStorage.getItem('analysis_history') || '[]');
                renderHistory(allHistory);
            }
        }

        // 渲染历史记录
        function renderHistory(data) {
            var listEl = document.getElementById('historyList');

            if (data.length === 0) {
                listEl.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-title">暂无分析记录</div><div class="empty-desc">点击「新建分析」开始您的第一次AI分析</div><a href="analyze.html" class="btn btn-primary">新建分析</a></div>';
                return;
            }

            var html = '';
            data.forEach(function(item, index) {
                var icon = item.type === 'sales_call' ? '📞' : (item.type === 'meeting' ? '📋' : '📝');
                var typeName = item.type === 'sales_call' ? '销售通话' : (item.type === 'meeting' ? '会议记录' : '访谈调研');
                var intentClass = 'intent-' + (item.analysis ? item.analysis.intent : 'medium');
                var intentText = item.analysis ? (item.analysis.intent === 'high' ? '高意向' : (item.analysis.intent === 'medium' ? '中意向' : '低意向')) : '未知';

                html += '<div class="history-card" style="animation:fadeIn 0.3s ease ' + (index * 0.05) + 's both">';
                html += '  <div class="history-icon">' + icon + '</div>';
                html += '  <div class="history-info" onclick="viewDetail(' + index + ')">';
                html += '    <div class="history-title">' + (item.title || '未命名分析') + '</div>';
                html += '    <div class="history-meta">';
                html += '      <span class="history-type">' + typeName + '</span>';
                html += '      <span class="history-time">' + formatTime(item.created_at) + '</span>';
                html += '    </div>';
                html += '  </div>';
                html += '  <div class="history-intent">';
                html += '    <span class="intent-tag ' + intentClass + '">' + intentText + '</span>';
                html += '  </div>';
                html += '  <div class="history-actions">';
                html += '    <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();deleteRecord(' + index + ')" title="删除">🗑️</button>';
                html += '  </div>';
                html += '</div>';
            });

            listEl.innerHTML = html;
        }

        // 筛选历史记录
        function filterHistory() {
            var keyword = document.getElementById('searchInput').value.trim().toLowerCase();
            if (!keyword) {
                renderHistory(allHistory);
                return;
            }

            var filtered = allHistory.filter(function(item) {
                return (item.title && item.title.toLowerCase().includes(keyword)) ||
                       (item.content && item.content.toLowerCase().includes(keyword));
            });

            renderHistory(filtered);
        }

        // 格式化时间
        function formatTime(dateStr) {
            if (!dateStr) return '';
            var date = new Date(dateStr);
            var now = new Date();
            var diff = now - date;
            var minutes = Math.floor(diff / 60000);
            var hours = Math.floor(diff / 3600000);
            var days = Math.floor(diff / 86400000);

            if (minutes < 1) return '刚刚';
            if (minutes < 60) return minutes + '分钟前';
            if (hours < 24) return hours + '小时前';
            if (days < 7) return days + '天前';

            var month = String(date.getMonth() + 1).padStart(2, '0');
            var day = String(date.getDate()).padStart(2, '0');
            return date.getFullYear() + '-' + month + '-' + day;
        }

        // 查看详情
        function viewDetail(index) {
            var item = allHistory[index];
            if (!item) return;

            var analysis = item.analysis || {};
            var intentText = analysis.intent === 'high' ? '高意向' : (analysis.intent === 'medium' ? '中意向' : '低意向');

            var html = '';

            // 意向度
            html += '<div style="text-align:center;margin-bottom:24px">';
            html += '  <span class="intent-tag intent-' + (analysis.intent || 'medium') + '" style="font-size:var(--text-lg);padding:12px 24px">' + intentText + '</span>';
            html += '</div>';

            // 关键需求
            if (analysis.key_needs && analysis.key_needs.length > 0) {
                html += '<div class="detail-section">';
                html += '  <h4 class="detail-section-title">🎯 关键需求</h4>';
                html += '  <ul class="detail-list">';
                analysis.key_needs.forEach(function(need) {
                    html += '<li>' + need + '</li>';
                });
                html += '  </ul>';
                html += '</div>';
            }

            // 客户痛点
            if (analysis.pain_points && analysis.pain_points.length > 0) {
                html += '<div class="detail-section">';
                html += '  <h4 class="detail-section-title">😤 客户痛点</h4>';
                html += '  <ul class="detail-list">';
                analysis.pain_points.forEach(function(point) {
                    html += '<li>' + point + '</li>';
                });
                html += '  </ul>';
                html += '</div>';
            }

            // 情绪变化
            if (analysis.emotion_trend) {
                html += '<div class="detail-section">';
                html += '  <h4 class="detail-section-title">😊 情绪变化</h4>';
                html += '  <div class="detail-text">' + analysis.emotion_trend + '</div>';
                html += '</div>';
            }

            // 行动建议
            if (analysis.action_suggestions && analysis.action_suggestions.length > 0) {
                html += '<div class="detail-section">';
                html += '  <h4 class="detail-section-title">💡 行动建议</h4>';
                html += '  <ul class="detail-list">';
                analysis.action_suggestions.forEach(function(suggestion) {
                    html += '<li>' + suggestion + '</li>';
                });
                html += '  </ul>';
                html += '</div>';
            }

            // 风险预警
            if (analysis.risks && analysis.risks.length > 0) {
                html += '<div class="detail-section">';
                html += '  <h4 class="detail-section-title">⚠️ 风险预警</h4>';
                html += '  <ul class="detail-list">';
                analysis.risks.forEach(function(risk) {
                    html += '<li>' + risk + '</li>';
                });
                html += '  </ul>';
                html += '</div>';
            }

            // 原始内容
            html += '<div class="detail-section">';
            html += '  <h4 class="detail-section-title">📝 原始内容</h4>';
            html += '  <div class="detail-original">' + (item.content || '无内容') + '</div>';
            html += '</div>';

            document.getElementById('detailTitle').textContent = item.title || '分析详情';
            document.getElementById('detailBody').innerHTML = html;
            document.getElementById('detailModal').classList.add('active');
        }

        // 关闭详情弹窗
        function closeDetailModal() {
            document.getElementById('detailModal').classList.remove('active');
        }

        // 删除记录
        function deleteRecord(index) {
            if (!confirm('确定要删除这条分析记录吗？')) return;

            var item = allHistory[index];
            if (window.api && item.id) {
                window.api.deleteAnalysis(item.id).then(function() {
                    allHistory.splice(index, 1);
                    renderHistory(allHistory);
                    showToast('已删除', 'success');
                }).catch(function() {
                    showToast('删除失败', 'error');
                });
            } else {
                allHistory.splice(index, 1);
                localStorage.setItem('analysis_history', JSON.stringify(allHistory));
                renderHistory(allHistory);
                showToast('已删除', 'success');
            }
        }

        // Toast提示
        function showToast(message, type) {
            if (window.utils) {
                window.utils.showToast(message, type);
            } else {
                alert(message);
            }
        }

        // 初始化
        loadHistory();
    </script>
</body>
</html>
