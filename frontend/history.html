<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分析记录 - 智析销售AI</title>
    <link rel="stylesheet" href="static/css/style.css">
    <style>
      .app-layout{display:flex;min-height:100vh;background:var(--bg-secondary)}
      .sidebar{width:240px;background:var(--bg-primary);border-right:1px solid var(--border-color);position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;z-index:100}
      .sidebar-logo{display:flex;align-items:center;gap:10px;padding:20px;border-bottom:1px solid var(--border-color)}
      .sidebar-logo img{width:28px;height:28px}.sidebar-logo span{font-size:var(--text-base);font-weight:700}
      .sidebar-nav{flex:1;padding:16px 12px;overflow-y:auto}
      .nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:var(--radius-md);font-size:var(--text-sm);color:var(--text-secondary);cursor:pointer;transition:all var(--transition-fast);margin-bottom:2px;text-decoration:none}
      .nav-item:hover{background:var(--gray-100);color:var(--text-primary)}
      .nav-item.active{background:var(--primary-50);color:var(--primary-600);font-weight:500}
      .nav-item svg{width:18px;height:18px;flex-shrink:0}
      .nav-section-title{font-size:var(--text-xs);font-weight:600;color:var(--text-tertiary);padding:8px 12px;text-transform:uppercase;letter-spacing:0.5px;margin-top:8px}
      .main-area{margin-left:240px;flex:1;display:flex;flex-direction:column}
      .topbar{height:56px;background:var(--bg-primary);border-bottom:1px solid var(--border-color);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:50}
      .content-area{flex:1;padding:24px;overflow-y:auto}
      .search-bar{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap}
      .search-bar input,.search-bar select{padding:10px 14px;border:1px solid var(--border-color);border-radius:var(--radius-md);font-size:var(--text-sm);outline:none;transition:all var(--transition-fast)}
      .search-bar input:focus,.search-bar select:focus{border-color:var(--primary-500);box-shadow:0 0 0 3px var(--primary-100)}
      .search-bar input{flex:1;min-width:200px}
      .search-bar select{min-width:120px;background:#fff}
      .history-list{display:flex;flex-direction:column;gap:12px}
      .history-item{display:flex;align-items:center;gap:16px;padding:16px;background:var(--bg-primary);border:1px solid var(--border-color);border-radius:var(--radius-md);cursor:pointer;transition:all var(--transition-fast);animation:fadeInUp 0.3s ease both}
      .history-item:hover{border-color:var(--primary-300);box-shadow:var(--shadow-sm);transform:translateY(-2px)}
      .history-icon{width:44px;height:44px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;font-size:22px;background:var(--primary-100);flex-shrink:0}
      .history-info{flex:1;min-width:0}
      .history-title{font-size:var(--text-sm);font-weight:600;color:var(--text-primary);margin-bottom:4px}
      .history-desc{font-size:var(--text-xs);color:var(--text-tertiary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
      .history-meta{display:flex;gap:16px;margin-top:6px;font-size:var(--text-xs);color:var(--text-secondary)}
      .history-score{font-size:var(--text-xl);font-weight:700;flex-shrink:0;min-width:40px;text-align:center}
      .history-badge{padding:4px 10px;border-radius:12px;font-size:var(--text-xs);font-weight:500;flex-shrink:0}
      .badge-completed{background:var(--success-light);color:var(--success)}
      .badge-processing{background:var(--warning-light);color:var(--warning)}
      .list-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
      .list-title{font-size:var(--text-lg);font-weight:600;color:var(--text-primary)}
      .list-count{font-size:var(--text-sm);color:var(--text-secondary)}
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <a href="/" class="sidebar-logo"><img src="static/images/logo.svg" alt="智析销售AI"><span>智析销售AI</span></a>
            <nav class="sidebar-nav">
                <div class="nav-section-title">主菜单</div>
                <a class="nav-item" href="dashboard.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>工作台</a>
                <a class="nav-item active" href="history.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>分析记录</a>
                <a class="nav-item" href="team.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle></svg>团队协作</a>
                <div class="nav-section-title">其他</div>
                <a class="nav-item" href="profile.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4"></path></svg>设置</a>
            </nav>
        </aside>

        <div class="main-area">
            <header class="topbar">
                <div style="font-size:var(--text-lg);font-weight:600">分析记录</div>
                <a href="dashboard.html" class="btn btn-primary">+ 新建分析</a>
            </header>

            <div class="content-area">
                <!-- 搜索筛选 -->
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="搜索分析记录...">
                    <select id="typeFilter">
                        <option value="">全部类型</option>
                        <option value="sales_call">销售通话</option>
                        <option value="meeting">会议记录</option>
                        <option value="interview">访谈调研</option>
                    </select>
                    <select id="statusFilter">
                        <option value="">全部状态</option>
                        <option value="completed">已完成</option>
                        <option value="processing">分析中</option>
                    </select>
                    <button class="btn btn-primary" id="searchBtn">搜索</button>
                </div>

                <!-- 列表头部 -->
                <div class="list-header">
                    <span class="list-title">全部记录</span>
                    <span class="list-count" id="listCount">共 0 条</span>
                </div>

                <!-- 列表内容 -->
                <div id="historyList"></div>

                <!-- 分页 -->
                <div id="pagination"></div>
            </div>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script src="static/js/auth.js"></script>
    <script src="static/js/api.js"></script>
    <script src="static/js/utils.js"></script>
    <script src="static/js/pagination.js"></script>
    <script>
        if(!window.auth.isLoggedIn()){window.location.href='login.html';}

        // 扩展Mock数据
        var allData = [];
        for(var i = 0; i < 50; i++) {
            var types = ['sales_call', 'meeting', 'interview'];
            var statuses = ['completed', 'completed', 'completed', 'processing'];
            var titles = ['客户A沟通记录', '团队周会纪要', '客户需求调研', '销售复盘会议', '产品介绍通话', '客户反馈访谈', '季度总结会议'];
            allData.push({
                id: i + 1,
                title: titles[i % titles.length] + ' #' + (i + 1),
                type: types[i % 3],
                status: statuses[i % 4],
                created_at: new Date(Date.now() - i * 86400000 * Math.random() * 7).toISOString(),
                summary: '这是一份关于销售对话的分析记录...',
                score: Math.floor(Math.random() * 40 + 60)
            });
        }

        var filteredData = allData;
        var currentPage = 1;
        var pageSize = 20;

        // 搜索功能（防抖300ms）
        var searchTimer = null;
        var searchInput = document.getElementById('searchInput');
        var typeFilter = document.getElementById('typeFilter');
        var statusFilter = document.getElementById('statusFilter');

        function doSearch() {
            var keyword = searchInput.value.trim().toLowerCase();
            var type = typeFilter.value;
            var status = statusFilter.value;

            filteredData = allData.filter(function(item) {
                var matchKeyword = !keyword || item.title.toLowerCase().indexOf(keyword) > -1;
                var matchType = !type || item.type === type;
                var matchStatus = !status || item.status === status;
                return matchKeyword && matchType && matchStatus;
            });

            currentPage = 1;
            renderList();
            pagination.updateTotal('pagination', filteredData.length);
        }

        searchInput.addEventListener('input', function() {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(doSearch, 300);
        });

        searchInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                clearTimeout(searchTimer);
                doSearch();
            }
        });

        typeFilter.addEventListener('change', doSearch);
        statusFilter.addEventListener('change', doSearch);
        document.getElementById('searchBtn').addEventListener('click', doSearch);

        // 渲染列表
        function renderList() {
            var start = (currentPage - 1) * pageSize;
            var end = start + pageSize;
            var pageData = filteredData.slice(start, end);
            var listEl = document.getElementById('historyList');

            document.getElementById('listCount').textContent = '共 ' + filteredData.length + ' 条';

            if (pageData.length === 0) {
                listEl.innerHTML = utils.getEmptyStateHTML('🔍', '没有找到匹配的记录', '尝试修改搜索条件', null, null);
                return;
            }

            var html = '<div class="history-list">';
            pageData.forEach(function(item, idx) {
                var icon = item.type === 'sales_call' ? '📞' : (item.type === 'meeting' ? '🤝' : '📝');
                var badge = item.status === 'completed' ? '<span class="history-badge badge-completed">已完成</span>' : '<span class="history-badge badge-processing">分析中</span>';
                var score = item.score ? '<div class="history-score" style="color:' + utils.getScoreColorHex(item.score) + '">' + item.score + '</div>' : '<div class="history-score" style="color:#9CA3AF">--</div>';

                html += '<div class="history-item" onclick="window.location.href=\'analysis.html?id=' + item.id + '\'" style="animation-delay:' + (idx * 0.05) + 's">';
                html += '<div class="history-icon">' + icon + '</div>';
                html += '<div class="history-info">';
                html += '<div class="history-title">' + item.title + '</div>';
                html += '<div class="history-meta"><span>' + utils.getAnalysisTypeName(item.type) + '</span><span>' + utils.timeAgo(item.created_at) + '</span></div>';
                html += '</div>';
                html += score + badge;
                html += '</div>';
            });
            html += '</div>';
            listEl.innerHTML = html;
        }

        // 初始化分页
        pagination.init({
            containerId: 'pagination',
            pageSize: pageSize,
            total: filteredData.length,
            onPageChange: function(page) {
                currentPage = page;
                renderList();
                window.scrollTo({top: 0, behavior: 'smooth'});
            }
        });

        // 初始渲染
        renderList();
    </script>
</body>
</html>
