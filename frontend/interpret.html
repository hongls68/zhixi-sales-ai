<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>原文解读 - 智析销售AI</title>
    <link rel="stylesheet" href="static/css/style.css">
    <style>
      .app-layout{display:flex;min-height:100vh;background:var(--bg-secondary)}
      .sidebar{width:240px;background:var(--bg-primary);border-right:1px solid var(--border-color);position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;z-index:100}
      .sidebar-logo{display:flex;align-items:center;gap:10px;padding:20px;border-bottom:1px solid var(--border-color);text-decoration:none}
      .sidebar-logo img{width:28px;height:28px}
      .sidebar-logo span{font-size:var(--text-base);font-weight:700;color:var(--text-primary)}
      .sidebar-nav{flex:1;padding:16px 12px;overflow-y:auto}
      .nav-section{margin-bottom:16px}
      .nav-section-title{font-size:var(--text-xs);font-weight:600;color:var(--text-tertiary);padding:8px 12px;text-transform:uppercase;letter-spacing:0.5px}
      .nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:var(--radius-md);font-size:var(--text-sm);color:var(--text-secondary);cursor:pointer;transition:all var(--transition-fast);margin-bottom:2px;text-decoration:none}
      .nav-item:hover{background:var(--gray-100);color:var(--text-primary)}
      .nav-item.active{background:var(--primary-50);color:var(--primary-600);font-weight:500}
      .nav-item svg{width:18px;height:18px;flex-shrink:0}
      .admin-only{display:none!important}
      .admin-only.show{display:flex!important}
      .main-area{margin-left:240px;flex:1;display:flex;flex-direction:column}
      .topbar{height:56px;background:var(--bg-primary);border-bottom:1px solid var(--border-color);display:flex;align-items:center;padding:0 24px;position:sticky;top:0;z-index:50}
      .content-area{flex:1;padding:24px;overflow-y:auto}
      .interpret-card{background:var(--bg-primary);border:1px solid var(--border-color);border-radius:var(--radius-lg);padding:32px;margin-bottom:24px}
      .interpret-title{font-size:var(--text-2xl);font-weight:700;color:var(--text-primary);margin-bottom:16px}
      .interpret-desc{font-size:var(--text-sm);color:var(--text-secondary);margin-bottom:24px}
      .textarea-wrapper{position:relative;margin-bottom:24px}
      .interpret-textarea{width:100%;min-height:300px;padding:16px;border:2px solid var(--border-color);border-radius:var(--radius-lg);font-size:var(--text-base);line-height:1.8;resize:vertical;font-family:inherit}
      .interpret-textarea:focus{outline:none;border-color:var(--primary-500)}
      .interpret-btn{width:100%;padding:16px;font-size:var(--text-lg)}
      .result-section{display:none;margin-top:24px}
      .result-card{background:var(--bg-primary);border:1px solid var(--border-color);border-radius:var(--radius-lg);padding:24px;margin-bottom:16px}
      .result-title{font-size:var(--text-base);font-weight:600;margin-bottom:12px}
      .result-content{font-size:var(--text-sm);color:var(--text-secondary);line-height:1.8}
    </style>
</head>
<body>
    <div class="app-layout">
                <!-- 侧边栏 -->
        <aside class="sidebar">
            <a href="/" class="sidebar-logo">
                <img src="static/images/logo.svg" alt="智析销售AI">
                <span>智析销售AI</span>
            </a>
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-section-title">主菜单</div>
                    <a class="nav-item" data-page="dashboard" href="dashboard.html">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                        工作台
                    </a>
                    <a class="nav-item" data-page="analyze" href="analyze.html">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
                        新建分析
                    </a>
                    <a class="nav-item" data-page="history" href="history.html">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
                        分析记录
                    </a>
                    <a class="nav-item" data-page="interpret" href="interpret.html">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><path d="M21 21l-4.35-4.35"></path></svg>
                        原文解读
                    </a>
                    <a class="nav-item" data-page="team" href="team.html">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle></svg>
                        团队协作
                    </a>
                    <a class="nav-item" data-page="analytics" href="analytics.html">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
                        数据统计
                    </a>
                </div>
                <div class="nav-section">
                    <div class="nav-section-title">系统设置</div>
                    <a class="nav-item" data-page="profile" href="profile.html">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle></svg>
                        个人设置
                    </a>
                    <a class="nav-item admin-only" data-page="admin" id="adminNav" href="admin.html">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                        管理后台
                    </a>
                    <a class="nav-item" href="#" onclick="handleLogout()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                        退出登录
                    </a>
                </div>
            </nav>
            <div class="sidebar-user">
                <div class="user-avatar-sm" id="sidebarAvatar">U</div>
                <div class="user-info-sm">
                    <div class="user-name-sm" id="sid

        <div class="main-area">
            <header class="topbar">
                <h1 style="font-size:var(--text-lg);font-weight:600">原文解读</h1>
            </header>

            <div class="content-area">
                <div class="interpret-card">
                    <h2 class="interpret-title">📝 原文解读</h2>
                    <p class="interpret-desc">粘贴任意文本内容，AI将为您智能解读、提取要点、生成摘要</p>

                    <div class="textarea-wrapper">
                        <textarea class="interpret-textarea" id="contentInput" placeholder="粘贴需要解读的文本内容...&#10;&#10;支持：&#10;- 产品介绍文档&#10;- 行业报告&#10;- 竞品分析&#10;- 客户邮件&#10;- 新闻资讯"></textarea>
                    </div>

                    <button class="btn btn-primary interpret-btn" onclick="interpretText()">开始解读</button>
                </div>

                <div class="result-section" id="resultSection">
                    <div class="result-card">
                        <div class="result-title">📋 内容摘要</div>
                        <div class="result-content" id="summary">-</div>
                    </div>
                    <div class="result-card">
                        <div class="result-title">🎯 关键要点</div>
                        <div class="result-content" id="keyPoints">-</div>
                    </div>
                    <div class="result-card">
                        <div class="result-title">💡 深度解读</div>
                        <div class="result-content" id="insights">-</div>
                    </div>
                    <div class="result-card">
                        <div class="result-title">🔗 相关建议</div>
                        <div class="result-content" id="suggestions">-</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="static/js/auth.js"></script>
    <script>
        if (!window.auth.isLoggedIn()) window.location.href = 'login.html';

        var user = window.auth.getUserInfo();
        if (user.role === 'admin') {
            document.getElementById('adminNav').classList.add('show');
        }

        function interpretText() {
            var content = document.getElementById('contentInput').value.trim();
            if (!content) {
                alert('请输入要解读的内容');
                return;
            }

            // Mock结果
            document.getElementById('summary').textContent = '本文主要介绍了产品的核心功能和优势，包括AI智能分析、多维度洞察、团队协作等功能。';
            document.getElementById('keyPoints').innerHTML = '<ul><li>核心功能：AI驱动的对话分析</li><li>主要优势：效率提升55倍</li><li>适用场景：销售通话、会议记录</li></ul>';
            document.getElementById('insights').textContent = '从文本可以看出，该产品专注于销售场景的AI应用，通过深度学习技术实现精准的对话分析，帮助销售团队提升转化率。';
            document.getElementById('suggestions').innerHTML = '<ul><li>建议进一步了解产品的具体功能细节</li><li>可以申请试用体验实际效果</li><li>关注产品的行业定制化能力</li></ul>';

            document.getElementById('resultSection').style.display = 'block';
            document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
