<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新建分析 - 智析销售AI</title>
    <link rel="stylesheet" href="static/css/style.css">
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <style>
      .app-layout{display:flex;min-height:100vh;background:#F0F2F7}
      .sidebar{width:240px;background:#fff;border-right:1px solid #E8EAF0;position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;z-index:100}
      .sidebar-logo{display:flex;align-items:center;gap:10px;padding:20px;border-bottom:1px solid #E8EAF0;text-decoration:none}
      .sidebar-logo img{width:28px;height:28px}.sidebar-logo span{font-size:15px;font-weight:700;color:#111827}
      .sidebar-nav{flex:1;padding:16px 12px;overflow-y:auto}
      .nav-section-title{font-size:11px;font-weight:600;color:#9CA3AF;padding:8px 12px;text-transform:uppercase;letter-spacing:0.5px;margin-top:8px}
      .nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;font-size:14px;color:#6B7280;cursor:pointer;transition:all .2s;margin-bottom:2px;text-decoration:none}
      .nav-item:hover{background:#F3F4F6;color:#374151}
      .nav-item.active{background:#EFF6FF;color:#2563EB;font-weight:600}
      .nav-item svg{width:18px;height:18px;flex-shrink:0}
      .main-area{margin-left:240px;flex:1;display:flex;flex-direction:column;min-height:100vh;background:#F0F2F7}
      .topbar{height:56px;background:rgba(255,255,255,0.88);backdrop-filter:blur(12px);border-bottom:1px solid rgba(0,0,0,0.06);display:flex;align-items:center;padding:0 32px;position:sticky;top:0;z-index:50}
      .topbar-title{font-size:15px;font-weight:600;color:#111827}
      .topbar-sub{font-size:12px;color:#9CA3AF;margin-left:8px}
      .content-area{flex:1;padding:28px 32px;width:100%}
      .content-wrapper{max-width:900px;margin:0 auto;width:100%}

      /* 输入区容器 */
      .input-section{background:#fff;border:1px solid #E5E7EB;border-radius:14px;overflow:hidden;margin-bottom:28px}

      /* 头部 */
      .input-header{padding:24px 28px 20px;border-bottom:1px solid #F3F4F6;display:flex;align-items:flex-start;justify-content:space-between}
      .input-header-left{display:flex;flex-direction:column;gap:6px}
      .input-header-title{font-size:17px;font-weight:700;color:#111827;display:flex;align-items:center;gap:8px}
      .input-header-title .title-dot{width:6px;height:6px;background:#2563EB;border-radius:50%}
      .input-header-desc{font-size:13px;color:#9CA3AF;line-height:1.5}
      .input-header-actions{display:flex;gap:8px;flex-shrink:0}

      /* 模式切换 Tab */
      .mode-tabs{display:flex;background:#F9FAFB;border-bottom:1px solid #F3F4F6;padding:0 28px}
      .mode-tab{padding:12px 16px;font-size:13px;font-weight:500;color:#9CA3AF;border-bottom:2px solid transparent;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px}
      .mode-tab:hover{color:#374151}
      .mode-tab.active{color:#2563EB;border-bottom-color:#2563EB}
      .mode-tab svg{width:15px;height:15px}

      /* 文本输入区 */
      .text-input-panel{padding:24px 28px}
      .textarea-wrapper{position:relative;margin-bottom:0}
      .analysis-textarea{width:100%;min-height:180px;padding:16px;border:1px solid #E5E7EB;border-radius:10px;font-size:14px;line-height:1.7;resize:vertical;transition:all .2s;font-family:inherit;background:#FAFAFA;color:#111827}
      .analysis-textarea:focus{outline:none;border-color:#BFDBFE;box-shadow:0 0 0 3px #EFF6FF;background:#fff}
      .analysis-textarea::placeholder{color:#D1D5DB}
      .char-count{position:absolute;bottom:12px;right:14px;font-size:12px;color:#D1D5DB;pointer-events:none}

      /* 录音上传区 */
      .record-panel{display:none;padding:24px 28px}
      .record-panel.active{display:block}
      .upload-zone{border:2px dashed #E5E7EB;border-radius:12px;padding:40px 24px;text-align:center;cursor:pointer;transition:all .2s;background:#FAFAFA}
      .upload-zone:hover,.upload-zone.drag-over{border-color:#BFDBFE;background:#EFF6FF}
      .upload-zone-icon{width:48px;height:48px;margin:0 auto 12px;background:#EFF6FF;border-radius:12px;display:flex;align-items:center;justify-content:center}
      .upload-zone-icon svg{width:24px;height:24px;color:#2563EB}
      .upload-zone-title{font-size:14px;font-weight:600;color:#374151;margin-bottom:4px}
      .upload-zone-hint{font-size:12px;color:#9CA3AF}
      .upload-zone input{display:none}

      /* 录音状态 */
      .record-state{display:none;padding:16px 24px;background:#FFFBEB;border-top:1px solid #FDE68A}
      .record-state.active{display:flex}
      .record-state-info{display:flex;align-items:center;gap:12px;flex:1}
      .record-icon-anim{width:32px;height:32px;background:#F59E0B;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
      .record-icon-anim svg{width:16px;height:16px;color:#fff}
      .record-state-text{flex:1}
      .record-state-title{font-size:13px;font-weight:600;color:#92400E}
      .record-state-sub{font-size:12px;color:#B45309}
      .record-actions{display:flex;gap:8px}
      .record-btn{padding:6px 12px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;border:none}
      .record-btn-cancel{background:#fff;color:#92400E;border:1px solid #FDE68A}
      .record-btn-cancel:hover{background:#FEF3C7}
      .record-btn-confirm{background:#F59E0B;color:#fff}
      .record-btn-confirm:hover{background:#D97706}

      /* 转写进度条 */
      .stt-progress{display:none;padding:20px 28px;background:#F0F9FF;border-top:1px solid #BAE6FD}
      .stt-progress.active{display:block}
      .stt-progress-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
      .stt-progress-title{font-size:13px;font-weight:600;color:#0369A1;display:flex;align-items:center;gap:6px}
      .stt-progress-title svg{width:15px;height:15px}
      .stt-progress-pct{font-size:12px;color:#0EA5E9;font-weight:600}
      .stt-bar{height:6px;background:#E0F2FE;border-radius:3px;overflow:hidden}
      .stt-bar-fill{height:100%;background:linear-gradient(90deg,#2563EB,#0EA5E9);border-radius:3px;transition:width .3s ease;width:0}
      .stt-transcript{margin-top:12px;font-size:13px;color:#6B7280;line-height:1.5}

      /* 配置行 */
      .config-row{display:flex;gap:12px;padding:16px 28px 20px;flex-wrap:wrap}
      .config-group{flex:1;min-width:140px}
      .config-label{display:block;font-size:12px;font-weight:600;color:#6B7280;margin-bottom:5px;letter-spacing:.3px}
      .form-select{width:100%;padding:7px 10px;border:1px solid #E5E7EB;border-radius:7px;font-size:13px;background:#FAFAFA;color:#111827;cursor:pointer;transition:all .2s}
      .form-select:focus{outline:none;border-color:#BFDBFE;box-shadow:0 0 0 3px #EFF6FF;background:#fff}

      /* 分析按钮 */
      .analyze-btn{width:calc(100% - 56px);margin:0 28px 24px;padding:14px;font-size:15px;font-weight:600;background:#2563EB;color:#fff;border:none;border-radius:10px;cursor:pointer;transition:all .2s;box-shadow:0 1px 3px rgba(37,99,235,.3);display:flex;align-items:center;justify-content:center;gap:8px}
      .analyze-btn:hover:not(:disabled){background:#1D4ED8;transform:translateY(-1px);box-shadow:0 4px 12px rgba(37,99,235,.35)}
      .analyze-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
      .analyze-btn .spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;display:none}
      .analyze-btn.loading .spinner{display:block}
      .analyze-btn.loading .btn-text{display:none}
      @keyframes spin{to{transform:rotate(360deg)}}

      /* 结果区 */
      .result-section{background:#fff;border:1px solid #E5E7EB;border-radius:14px;padding:28px;margin-bottom:28px;box-shadow:0 2px 12px rgba(0,0,0,.04)}
      .result-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid #F3F4F6}
      .result-title{font-size:16px;font-weight:700;color:#111827}
      .result-actions{display:flex;gap:8px}
      .btn{padding:7px 14px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;border:1px solid transparent}
      .btn-secondary{background:#F9FAFB;color:#374151;border-color:#E5E7EB}
      .btn-secondary:hover{background:#F3F4F6}
      .btn-primary{background:#2563EB;color:#fff}
      .btn-primary:hover{background:#1D4ED8}
      .btn-sm{padding:5px 10px;font-size:12px}

      /* Lead Score - 优化配色 */
      .lead-score-card{background:linear-gradient(135deg,#E0F2FE,#BAE6FD);border-radius:12px;padding:20px 24px;color:#1E293B;margin-bottom:20px;display:flex;align-items:flex-start;justify-content:space-between;gap:16px;box-shadow:0 4px 16px rgba(186,230,253,0.4)}
      .lead-score-left{flex:1}
      .lead-score-title{font-size:12px;color:#64748B;margin-bottom:6px}
      .intent-badge{display:inline-block;padding:4px 10px;background:rgba(37,99,235,0.12);border-radius:20px;font-size:12px;font-weight:600;margin-top:4px;color:#2563EB}
      .lead-score-right{text-align:right;flex-shrink:0}
      .lead-score-value{font-size:40px;font-weight:800;line-height:1;color:#1E293B}
      .lead-score-label{font-size:11px;color:#64748B;margin-top:4px}
      .lead-score-bar{height:6px;background:rgba(37,99,235,0.15);border-radius:3px;overflow:hidden;margin:12px 0 10px}
      .lead-score-bar-fill{height:100%;background:linear-gradient(90deg,#3B82F6,#2563EB);border-radius:3px;transition:width 1s ease}
      .closing-prob{display:flex;align-items:center;gap:6px;font-size:12px;color:#475569}
      .closing-prob-value{font-weight:700;font-size:15px;color:#1E293B}

      /* 分析网格 - Bento */
      .analysis-grid{display:grid;grid-template-columns:repeat(12,1fr);grid-auto-rows:minmax(70px,auto);gap:14px;margin-bottom:20px}
      .analysis-card{background:#FAFAFA;border:1px solid #F3F4F6;border-radius:12px;padding:16px;transition:all .2s}
      .analysis-card:hover{border-color:#E5E7EB;box-shadow:0 2px 8px rgba(0,0,0,.04)}
      .analysis-card.summary{grid-column:span 12}
      .analysis-card.needs{grid-column:span 4}
      .analysis-card.pain{grid-column:span 4}
      .analysis-card.emotion{grid-column:span 4}
      .analysis-card.actions{grid-column:span 6}
      .analysis-card.detail{grid-column:span 6}
      .card-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
      .card-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
      .card-icon.blue{background:#EFF6FF}
      .card-icon.green{background:#ECFDF5}
      .card-icon.orange{background:#FFFBEB}
      .card-icon.purple{background:#F5F3FF}
      .card-title{font-size:13px;font-weight:600;color:#374151}
      .card-content{font-size:13px;line-height:1.65;color:#6B7280}
      .card-content ul{margin:6px 0;padding-left:16px}
      .card-content li{margin-bottom:4px}
      .save-section{text-align:center;margin-top:20px}

      /* 响应式 */
      @media (max-width:768px){
        .analysis-grid{grid-template-columns:1fr}
        .analysis-card.summary,.analysis-card.needs,.analysis-card.pain,.analysis-card.emotion,.analysis-card.actions,.analysis-card.detail{grid-column:span 1}
        .config-row{flex-direction:column}
        .input-header{flex-direction:column;gap:12px}
        .lead-score-card{flex-direction:column}
        .lead-score-right{text-align:left}
      }
      @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    </style>
</head>
<body>
    <div class="app-layout">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <a href="/" class="sidebar-logo">
                <img src="static/images/logo.svg" alt="智析销售AI">
                <span>智析销售AI</span>
            </a>
            <nav class="sidebar-nav">
                <div class="nav-section-title">主菜单</div>
                <a class="nav-item" href="app.html#dashboard"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>工作台</a>
                <a class="nav-item active" href="analyze.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>新建分析</a>
                <a class="nav-item" href="history.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line></svg>分析记录</a>
                <a class="nav-item" href="app.html#team"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle></svg>团队协作</a>
                <div class="nav-section-title">其他</div>
                <a class="nav-item" href="app.html#profile"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle></svg>设置</a>
            </nav>
        </aside>

        <!-- 主内容区 -->
        <div class="main-area">
            <header class="topbar">
                <div class="topbar-title">新建分析<span class="topbar-sub">/ 智能销售分析</span></div>
            </header>

            <div class="content-area">
                <div class="content-wrapper">
                <!-- 输入区域 -->
                <div class="input-section" id="inputSection">

                    <!-- 头部 -->
                    <div class="input-header">
                        <div class="input-header-left">
                            <div class="input-header-title">
                                <span class="title-dot"></span>
                                智能销售分析
                            </div>
                            <div class="input-header-desc">粘贴对话文本或上传录音，AI 自动分析客户意向与需求</div>
                        </div>
                        <div class="input-header-actions">
                            <button class="btn btn-secondary btn-sm" onclick="clearInput()">清空</button>
                        </div>
                    </div>

                    <!-- 模式切换 Tab -->
                    <div class="mode-tabs">
                        <div class="mode-tab active" data-mode="text" onclick="switchMode('text', this)">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line></svg>
                            文本输入
                        </div>
                        <div class="mode-tab" data-mode="audio" onclick="switchMode('audio', this)">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
                            录音上传
                        </div>
                    </div>

                    <!-- 文本输入面板 -->
                    <div class="text-input-panel" id="textPanel">
                        <div class="textarea-wrapper">
                            <textarea class="analysis-textarea" id="contentInput" placeholder="请粘贴需要分析的销售对话或会议记录内容..."></textarea>
                            <div class="char-count" id="charCount">0 / 5000</div>
                        </div>
                    </div>

                    <!-- 录音上传面板 -->
                    <div class="record-panel" id="audioPanel">
                        <!-- 上传区 -->
                        <div class="upload-zone" id="uploadZone" onclick="document.getElementById('audioFile').click()">
                            <div class="upload-zone-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                            </div>
                            <div class="upload-zone-title">点击上传音频文件</div>
                            <div class="upload-zone-hint">支持 mp3、wav、m4a 格式，最大 20MB</div>
                            <input type="file" id="audioFile" accept=".mp3,.wav,.m4a,audio/*" onchange="handleAudioUpload(this.files[0])">
                        </div>
                        <!-- 转写进度条 -->
                        <div class="stt-progress" id="sttProgress">
                            <div class="stt-progress-header">
                                <div class="stt-progress-title">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                                    正在转写音频...
                                </div>
                                <div class="stt-progress-pct" id="sttPct">0%</div>
                            </div>
                            <div class="stt-bar"><div class="stt-bar-fill" id="sttBar"></div></div>
                            <div class="stt-transcript" id="sttTranscript"></div>
                        </div>
                    </div>

                    <!-- 配置选项 -->
                    <div class="config-row">
                        <div class="config-group">
                            <label class="config-label">分析风格</label>
                            <select class="form-select" id="styleSelect">
                                <option value="professional">专业严谨</option>
                                <option value="casual">轻松随意</option>
                                <option value="detailed">详细全面</option>
                            </select>
                        </div>
                        <div class="config-group">
                            <label class="config-label">分析深度</label>
                            <select class="form-select" id="depthSelect">
                                <option value="quick">快速概览</option>
                                <option value="standard" selected>标准分析</option>
                                <option value="deep">深度洞察</option>
                            </select>
                        </div>
                        <div class="config-group">
                            <label class="config-label">输出语言</label>
                            <select class="form-select" id="languageSelect">
                                <option value="zh" selected>中文</option>
                                <option value="en">英文</option>
                            </select>
                        </div>
                    </div>

                    <!-- 分析按钮 -->
                    <button class="analyze-btn" id="analyzeBtn" onclick="startAnalysis()">
                        <span class="btn-text">开始智能分析</span>
                        <div class="spinner"></div>
                    </button>
                </div>

                <!-- 分析结果区域 -->
                <div class="result-section" id="resultSection">
                    <div class="result-header">
                        <h2 class="result-title">专业分析报告</h2>
                        <div class="result-actions">
                            <button class="btn btn-secondary" onclick="copyResult()">复制结果</button>
                            <button class="btn btn-primary" onclick="saveToHistory()">保存记录</button>
                        </div>
                    </div>

                    <!-- Lead Score 卡片 -->
                    <div class="lead-score-card" id="leadScoreCard">
                        <div class="lead-score-left">
                            <div class="lead-score-title">客户意向度评分</div>
                            <div id="intentBadge" class="intent-badge">高意向</div>
                        </div>
                        <div class="lead-score-right">
                            <div class="lead-score-value" id="leadScoreValue">85</div>
                            <div class="lead-score-label">Lead Score</div>
                        </div>
                        <div style="width:100%;grid-column:1/-1">
                            <div class="lead-score-bar"><div class="lead-score-bar-fill" id="leadScoreBar"></div></div>
                            <div class="closing-prob">
                                <span class="closing-prob-label">成交概率</span>
                                <span class="closing-prob-value" id="closingProb">75%</span>
                            </div>
                        </div>
                    </div>

                    <!-- 分析网格 - Bento -->
                    <div class="analysis-grid">
                        <div class="analysis-card summary">
                            <div class="card-header">
                                <div class="card-icon blue">📊</div>
                                <h3 class="card-title">核心摘要</h3>
                            </div>
                            <div class="card-content" id="summaryBrief"></div>
                        </div>

                        <div class="analysis-card needs">
                            <div class="card-header">
                                <div class="card-icon green">🎯</div>
                                <h3 class="card-title">关键需求</h3>
                            </div>
                            <div class="card-content" id="keyNeeds"></div>
                        </div>

                        <div class="analysis-card pain">
                            <div class="card-header">
                                <div class="card-icon orange">😤</div>
                                <h3 class="card-title">客户痛点</h3>
                            </div>
                            <div class="card-content" id="painPoints"></div>
                        </div>

                        <div class="analysis-card emotion">
                            <div class="card-header">
                                <div class="card-icon purple">😊</div>
                                <h3 class="card-title">情绪变化</h3>
                            </div>
                            <div class="card-content" id="emotionTrend"></div>
                        </div>

                        <div class="analysis-card actions">
                            <div class="card-header">
                                <div class="card-icon blue">💡</div>
                                <h3 class="card-title">行动建议</h3>
                            </div>
                            <div class="card-content" id="actionSuggestions"></div>
                        </div>

                        <div class="analysis-card detail">
                            <div class="card-header">
                                <div class="card-icon green">📝</div>
                                <h3 class="card-title">详细分析</h3>
                            </div>
                            <div class="card-content" id="summaryDetail"></div>
                        </div>
                    </div>

                    <div class="save-section">
                        <button class="btn btn-primary" onclick="saveToHistory()">保存到历史记录</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 详情弹窗 -->
    <div class="detail-modal" id="detailModal">
        <div class="detail-content">
            <div class="detail-header">
                <h3 class="detail-title" id="detailTitle">分析详情</h3>
                <div class="detail-close" onclick="closeDetailModal()">✕</div>
            </div>
            <div id="detailBody"></div>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script src="static/js/auth.js"></script>
    <script src="static/js/utils.js"></script>
    <script>
        var selectedMode = 'text';
        var selectedType = 'sales_call';
        var currentResult = null;
        var currentAudioFile = null;

        // 切换输入模式
        function switchMode(mode, el) {
            selectedMode = mode;
            document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('textPanel').style.display = mode === 'text' ? 'block' : 'none';
            document.getElementById('audioPanel').classList.toggle('active', mode === 'audio');
            // 录音模式下不检查文本字数
            updateAnalyzeBtn();
        }

        // 清空输入
        function clearInput() {
            document.getElementById('contentInput').value = '';
            updateCharCount();
            currentAudioFile = null;
            document.getElementById('uploadZone').style.display = 'block';
            document.getElementById('sttProgress').classList.remove('active');
            updateAnalyzeBtn();
        }

        // 更新分析按钮状态
        function updateAnalyzeBtn() {
            var btn = document.getElementById('analyzeBtn');
            if (selectedMode === 'text') {
                var text = document.getElementById('contentInput').value.trim();
                btn.disabled = text.length < 10;
            } else {
                btn.disabled = !currentAudioFile;
            }
        }

        // 处理音频上传
        function handleAudioUpload(file) {
            if (!file) return;
            var validTypes = ['audio/mpeg', 'audio/wav', 'audio/x-wav', 'audio/mp4', 'audio/x-m4a', 'audio/m4a'];
            var ext = file.name.split('.').pop().toLowerCase();
            if (!validTypes.includes(file.type) && !['mp3', 'wav', 'm4a'].includes(ext)) {
                showToast('请上传 mp3、wav 或 m4a 格式的音频文件', 'warning');
                return;
            }
            if (file.size > 20 * 1024 * 1024) {
                showToast('音频文件不能超过 20MB', 'warning');
                return;
            }
            currentAudioFile = file;
            document.getElementById('uploadZone').style.display = 'none';
            startMockSTT(file);
            updateAnalyzeBtn();
        }

        // 模拟转写（前端占位，后续接真实 API）
        function startMockSTT(file) {
            var progress = document.getElementById('sttProgress');
            var bar = document.getElementById('sttBar');
            var pct = document.getElementById('sttPct');
            var transcript = document.getElementById('sttTranscript');
            progress.classList.add('active');
            bar.style.width = '0%';
            pct.textContent = '0%';
            transcript.textContent = '正在连接转写服务...';

            var steps = [
                { pct: 20, text: '正在解析音频格式...' },
                { pct: 45, text: '正在分段识别语音内容...' },
                { pct: 75, text: '正在校正识别结果...' },
                { pct: 95, text: '正在生成对话文本...' },
                { pct: 100, text: '转写完成' }
            ];
            var idx = 0;
            var interval = setInterval(function() {
                if (idx < steps.length) {
                    bar.style.width = steps[idx].pct + '%';
                    pct.textContent = steps[idx].pct + '%';
                    transcript.textContent = steps[idx].text;
                    idx++;
                } else {
                    clearInterval(interval);
                    // 模拟转写完成后，填充文本
                    var mockText = '客户：这个产品多少钱？\n销售：我们的产品有三个版本，基础版99元，专业版199元，企业版499元。\n客户：专业版有什么功能？\n销售：专业版包含所有基础功能，另外还有高级报表、团队协作、数据导出等。\n客户：可以试用吗？\n销售：可以的，我们可以提供7天免费试用。';
                    document.getElementById('contentInput').value = mockText;
                    updateCharCount();
                    showToast('转写完成，已自动填入文本框', 'success');
                    switchMode('text', document.querySelector('.mode-tab[data-mode="text"]'));
                    updateAnalyzeBtn();
                }
            }, 600);
        }

        // 更新字数统计
        function updateCharCount() {
            var text = document.getElementById('contentInput').value;
            var count = text.length;
            document.getElementById('charCount').textContent = count + ' / 5000';
            updateAnalyzeBtn();
        }

        // 开始分析
        function startAnalysis() {
            var content = document.getElementById('contentInput').value.trim();
            if (content.length < 10) {
                showToast('请输入至少10个字符的内容', 'warning');
                return;
            }

            var btn = document.getElementById('analyzeBtn');
            btn.disabled = true;
            btn.classList.add('loading');

            var style = document.getElementById('styleSelect').value;
            var depth = document.getElementById('depthSelect').value;
            var language = document.getElementById('languageSelect').value;

            if (window.api) {
                window.api.createAnalysis(content, content.substring(0, 20) + '...', selectedType, style, depth, language)
                    .then(function(result) { displayResult(result); })
                    .catch(function() {
                        var mockResult = getMockResult(content);
                        displayResult(mockResult);
                    });
            } else {
                var mockResult = getMockResult(content);
                displayResult(mockResult);
            }
        }

        // 生成 Mock 结果
        function getMockResult(content) {
            var hasPrice = content.includes('价格') || content.includes('钱') || content.includes('费');
            var hasTime = content.includes('时间') || content.includes('明天') || content.includes('下周');
            var hasTrial = content.includes('试用');

            var intent = 'medium';
            var score = 65;
            if (hasPrice && hasTime) { intent = 'high'; score = 85; }
            else if (hasPrice || hasTime) { intent = 'medium'; score = 70; }
            else { intent = 'low'; score = 45; }

            return {
                success: true,
                data: {
                    summary_brief: '客户对产品表现出一定兴趣，重点讨论了价格和功能方面的问题，建议继续跟进并提供更详细的方案。',
                    summary_detail: '从对话内容来看，客户主要关注以下几个方面：\n\n1. 产品价格：客户询问了不同版本的价格差异\n2. 功能特性：对专业版的功能特别感兴趣\n3. 使用场景：希望了解产品在实际业务中的应用\n\n建议下一步：\n- 提供详细的产品对比表\n- 安排产品演示\n- 发送试用版本',
                    intent: intent,
                    intent_score: score,
                    key_needs: ['产品功能', '价格优惠', '技术支持'],
                    pain_points: ['预算有限', '时间紧迫'],
                    emotion_trend: '客户情绪从最初的谨慎逐渐转变为积极，在讨论产品功能时表现出明显兴趣。',
                    action_suggestions: ['24小时内发送详细产品资料', '安排下周产品演示会议', '准备针对性的优惠方案'],
                    risks: ['竞争对手也在接触该客户', '决策周期可能较长']
                }
            };
        }

        // 显示结果
        function displayResult(result) {
            var data = result.data || result;
            currentResult = result;

            document.getElementById('resultSection').style.display = 'block';
            document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth' });

            var score = data.intent_score || 75;
            document.getElementById('leadScoreValue').textContent = score;
            document.getElementById('leadScoreBar').style.width = score + '%';
            document.getElementById('closingProb').textContent = Math.floor(score * 0.9) + '%';

            var intentBadge = document.getElementById('intentBadge');
            var intentText = data.intent === 'high' ? '高意向' : (data.intent === 'medium' ? '中意向' : '低意向');
            intentBadge.textContent = intentText;

            document.getElementById('summaryBrief').textContent = data.summary_brief || '暂无摘要';

            var needsHtml = '';
            if (data.key_needs && data.key_needs.length > 0) {
                needsHtml = '<ul>' + data.key_needs.map(function(need) { return '<li>' + need + '</li>'; }).join('') + '</ul>';
            }
            document.getElementById('keyNeeds').innerHTML = needsHtml || '暂无关键需求';

            var painHtml = '';
            if (data.pain_points && data.pain_points.length > 0) {
                painHtml = '<ul>' + data.pain_points.map(function(pain) { return '<li>' + pain + '</li>'; }).join('') + '</ul>';
            }
            document.getElementById('painPoints').innerHTML = painHtml || '暂无明确痛点';

            document.getElementById('emotionTrend').textContent = data.emotion_trend || '暂无情绪分析';

            var actionHtml = '';
            if (data.action_suggestions && data.action_suggestions.length > 0) {
                actionHtml = '<ul>' + data.action_suggestions.map(function(action) { return '<li>' + action + '</li>'; }).join('') + '</ul>';
            }
            document.getElementById('actionSuggestions').innerHTML = actionHtml || '暂无建议';

            document.getElementById('summaryDetail').textContent = data.summary_detail || data.summary_brief || '对话分析完成';
            document.getElementById('summaryDetail').style.cssText = 'white-space:pre-wrap;line-height:1.7';

            var btn = document.getElementById('analyzeBtn');
            btn.disabled = false;
            btn.classList.remove('loading');

            showToast('分析完成！', 'success');
        }

        // 复制结果
        function copyResult() {
            if (!currentResult) { showToast('暂无可复制的内容', 'warning'); return; }
            var data = currentResult.data || currentResult;
            var text = '【销售分析报告】\n\n';
            text += '核心摘要：' + (data.summary_brief || '') + '\n\n';
            text += '关键需求：' + (data.key_needs || []).join('、') + '\n';
            text += '客户痛点：' + (data.pain_points || []).join('、') + '\n';
            text += '情绪变化：' + (data.emotion_trend || '') + '\n';
            text += '行动建议：' + (data.action_suggestions || []).join('、') + '\n';
            navigator.clipboard.writeText(text).then(function() { showToast('已复制到剪贴板', 'success'); });
        }

        // 保存到历史记录
        function saveToHistory() {
            if (!currentResult) { showToast('请先进行分析', 'warning'); return; }
            showToast('已保存到分析记录', 'success');
            setTimeout(function() { window.location.href = 'history.html'; }, 1000);
        }

        // Toast 提示
        function showToast(message, type) {
            if (window.utils) { window.utils.showToast(message, type); }
            else { alert(message); }
        }

        // 初始化
        document.getElementById('contentInput').addEventListener('input', updateCharCount);
        updateCharCount();
    </script>
</body>
</html>
