        <script>
        // 高亮当前页面菜单
        (function() {
            var currentPath = window.location.pathname;
            var filename = currentPath.split('/').pop() || 'dashboard.html';
            var currentPage = filename.replace('.html', '');

            // 移除所有active
            document.querySelectorAll('.nav-item').forEach(function(item) {
                item.classList.remove('active');
            });

            // 添加active到当前页面
            var activeItem = document.querySelector('[data-page="' + currentPage + '"]');
            if (activeItem) {
                activeItem.classList.add('active');
            }

            // 显示管理员菜单（如果需要）
            if (window.auth && window.auth.isLoggedIn()) {
                var user = window.auth.getUserInfo();
                if (user.role === 'admin' || user.phone === 'admin') {
                    var adminNav = document.getElementById('adminNav');
                    if (adminNav) {
                        adminNav.classList.add('show');
                    }
                }
            }
        })();
        </script>
