<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 智析销售AI</title>
    <link rel="stylesheet" href="static/css/style.css">
    <style>
      .register-page{min-height:100vh;display:flex}
      .register-brand{flex:0 0 45%;background:linear-gradient(135deg,#1E40AF 0%,#3B82F6 50%,#60A5FA 100%);display:flex;align-items:center;justify-content:center;padding:60px;position:relative;overflow:hidden}
      .register-brand::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle,rgba(255,255,255,0.1) 0%,transparent 50%);animation:float 6s ease-in-out infinite}
      @keyframes float{0%,100%{transform:translate(0,0)}50%{transform:translate(-20px,-20px)}}
      .register-brand-content{position:relative;z-index:1;text-align:center;color:white}
      .register-brand-logo{width:80px;height:80px;background:rgba(255,255,255,0.2);border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 24px}
      .register-brand-logo img{width:48px;height:48px}
      .register-brand-name{font-size:var(--text-3xl);font-weight:700;margin-bottom:12px}
      .register-brand-slogan{font-size:var(--text-lg);opacity:0.9}
      .register-form-section{flex:1;display:flex;align-items:center;justify-content:center;padding:40px;background:var(--bg-primary)}
      .register-form-container{width:100%;max-width:420px}
      .register-form-header{margin-bottom:32px}
      .register-form-title{font-size:var(--text-2xl);font-weight:700;color:var(--text-primary);margin-bottom:8px}
      .register-form-subtitle{font-size:var(--text-sm);color:var(--text-secondary)}
      .register-form-subtitle a{color:var(--primary-500);font-weight:500}
      .phone-input-group{display:flex;border:1px solid var(--border-color);border-radius:var(--radius-md);overflow:hidden;transition:all var(--transition-fast)}
      .phone-input-group:focus-within{border-color:var(--primary-500);box-shadow:0 0 0 3px var(--primary-100)}
      .phone-prefix{padding:10px 14px;background:var(--gray-50);border-right:1px solid var(--border-color);font-size:var(--text-sm);color:var(--text-secondary);font-weight:500}
      .phone-input-group input{flex:1;border:none;padding:10px 14px;font-size:var(--text-sm);outline:none}
      .code-input-group{display:flex;gap:12px}
      .code-input-group input{flex:1}
      .code-input-group .btn{white-space:nowrap;min-width:120px}
      .password-wrapper{position:relative}
      .password-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-tertiary);font-size:var(--text-sm)}
      .agreement{display:flex;align-items:flex-start;gap:10px;margin-top:20px;margin-bottom:24px}
      .agreement input[type="checkbox"]{width:16px;height:16px;margin-top:2px;accent-color:var(--primary-500);cursor:pointer}
      .agreement-text{font-size:var(--text-xs);color:var(--text-tertiary);line-height:1.6}
      .agreement-text a{color:var(--primary-500)}
      @media(max-width:768px){.register-page{flex-direction:column}.register-brand{padding:40px 20px;min-height:180px}.register-form-section{padding:30px 20px}}
    </style>
</head>
<body>
    <div class="register-page">
        <div class="register-brand">
            <div class="register-brand-content">
                <div class="register-brand-logo"><img src="static/images/logo.svg" alt="智析销售AI"></div>
                <h1 class="register-brand-name">智析销售AI</h1>
                <p class="register-brand-slogan">开启智能销售之旅</p>
            </div>
        </div>

        <div class="register-form-section">
            <div class="register-form-container">
                <div class="register-form-header">
                    <h2 class="register-form-title">创建账号</h2>
                    <p class="register-form-subtitle">已有账号？<a href="login.html">立即登录</a></p>
                </div>

                <form id="registerForm" onsubmit="return false;">
                    <div class="form-group">
                        <label class="form-label">手机号</label>
                        <div class="phone-input-group" id="phoneGroup">
                            <span class="phone-prefix">+86</span>
                            <input type="tel" id="phoneInput" placeholder="请输入手机号" maxlength="11">
                        </div>
                        <div class="form-error" id="phoneError" style="display:none"></div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">验证码</label>
                        <div class="code-input-group">
                            <input type="text" id="codeInput" placeholder="请输入验证码" maxlength="6">
                            <button type="button" class="btn btn-secondary" id="sendCodeBtn">发送验证码</button>
                        </div>
                        <div class="form-error" id="codeError" style="display:none"></div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">设置密码</label>
                        <div class="password-wrapper">
                            <input type="password" class="form-input" id="passwordInput" placeholder="至少6位密码" maxlength="20">
                            <button type="button" class="password-toggle" id="togglePwd">显示</button>
                        </div>
                        <div class="form-error" id="passwordError" style="display:none"></div>
                    </div>

                    <div class="agreement">
                        <input type="checkbox" id="agreeCheckbox">
                        <label class="agreement-text" for="agreeCheckbox">
                            注册即表示同意<a href="#">《用户协议》</a>和<a href="#">《隐私政策》</a>
                        </label>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg btn-block" id="registerBtn" disabled>
                        <span class="btn-text">注册</span>
                        <div class="spinner" style="display:none"></div>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script src="static/js/auth.js"></script>
    <script src="static/js/utils.js"></script>
    <script>
        if(window.auth.isLoggedIn()){window.location.href='dashboard.html';}

        var phoneInput=document.getElementById('phoneInput');
        var codeInput=document.getElementById('codeInput');
        var passwordInput=document.getElementById('passwordInput');
        var sendCodeBtn=document.getElementById('sendCodeBtn');
        var registerBtn=document.getElementById('registerBtn');
        var agreeCheckbox=document.getElementById('agreeCheckbox');
        var countdown=0,timer=null;

        function isValid(p){return/^1[3-9]\d{9}$/.test(p);}
        function updateBtn(){
            registerBtn.disabled=!(isValid(phoneInput.value)&&/^\d{6}$/.test(codeInput.value)&&passwordInput.value.length>=6&&agreeCheckbox.checked);
        }

        sendCodeBtn.onclick=function(){
            var phone=phoneInput.value;
            if(!isValid(phone)){document.getElementById('phoneError').textContent='请输入正确的11位手机号';document.getElementById('phoneError').style.display='block';return;}
            document.getElementById('phoneError').style.display='none';
            sendCodeBtn.disabled=true;countdown=60;
            timer=setInterval(function(){countdown--;if(countdown<=0){clearInterval(timer);sendCodeBtn.disabled=false;sendCodeBtn.textContent='发送验证码'}else{sendCodeBtn.textContent=countdown+'秒后重试'}},1000);
            window.auth.mockSendCode(phone).then(function(){window.utils.showToast('验证码已发送','success');}).catch(function(e){
                document.getElementById('phoneError').textContent=e.message;document.getElementById('phoneError').style.display='block';
                clearInterval(timer);sendCodeBtn.disabled=false;sendCodeBtn.textContent='发送验证码';
            });
        };

        registerBtn.onclick=function(){
            registerBtn.disabled=true;registerBtn.querySelector('.btn-text').style.display='none';registerBtn.querySelector('.spinner').style.display='block';
            window.auth.mockRegister(phoneInput.value,codeInput.value,passwordInput.value).then(function(r){
                window.auth.setAuth(r.token,r.user);window.utils.showToast('注册成功','success');
                setTimeout(function(){window.location.href='dashboard.html';},1000);
            }).catch(function(e){window.utils.showToast(e.message,'error');})
            .finally(function(){registerBtn.querySelector('.btn-text').style.display='block';registerBtn.querySelector('.spinner').style.display='none';updateBtn();});
        };

        document.getElementById('togglePwd').onclick=function(){
            var inp=passwordInput;inp.type=inp.type==='password'?'text':'password';
            document.getElementById('togglePwd').textContent=inp.type==='password'?'显示':'隐藏';
        };

        [phoneInput,codeInput,passwordInput].forEach(function(el){el.addEventListener('input',updateBtn);});
        agreeCheckbox.addEventListener('change',updateBtn);
    </script>
</body>
</html>
