<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 智析销售AI</title>
    <link rel="stylesheet" href="static/css/style.css">
    <style>
      .app-layout{display:flex;min-height:100vh;background:var(--bg-secondary)}
      .sidebar{width:240px;background:var(--bg-primary);border-right:1px solid var(--border-color);position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;z-index:100}
      .sidebar-logo{display:flex;align-items:center;gap:10px;padding:20px;border-bottom:1px solid var(--border-color)}
      .sidebar-logo img{width:28px;height:28px}.sidebar-logo span{font-size:var(--text-base);font-weight:700}
      .sidebar-nav{flex:1;padding:16px 12px;overflow-y:auto}
      .nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:var(--radius-md);font-size:var(--text-sm);color:var(--text-secondary);cursor:pointer;transition:all var(--transition-fast);margin-bottom:2px;text-decoration:none}
      .nav-item:hover{background:var(--gray-100);color:var(--text-primary)}
      .nav-item.active{background:var(--primary-50);color:var(--primary-600);font-weight:500}
      .nav-item svg{width:18px;height:18px;flex-shrink:0}
      .nav-section-title{font-size:var(--text-xs);font-weight:600;color:var(--text-tertiary);padding:8px 12px;text-transform:uppercase;letter-spacing:0.5px;margin-top:8px}
      .main-area{margin-left:240px;flex:1;display:flex;flex-direction:column}
      .topbar{height:56px;background:var(--bg-primary);border-bottom:1px solid var(--border-color);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:50}
      .content-area{flex:1;padding:24px;overflow-y:auto}
      .stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:24px}
      .stat-card{background:var(--bg-primary);border:1px solid var(--border-color);border-radius:var(--radius-lg);padding:20px}
      .stat-label{font-size:var(--text-sm);color:var(--text-secondary);margin-bottom:8px}
      .stat-value{font-size:var(--text-3xl);font-weight:700;color:var(--text-primary)}
      .stat-trend{font-size:var(--text-xs);color:var(--success);margin-top:4px}
      .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
      .section-card{background:var(--bg-primary);border:1px solid var(--border-color);border-radius:var(--radius-lg)}
      .section-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border-color)}
      .section-title{font-size:var(--text-base);font-weight:600;color:var(--text-primary)}
      .section-body{padding:20px}
      .table-container{overflow-x:auto}
      table{width:100%;border-collapse:collapse}
      table th,table td{padding:12px 16px;text-align:left;border-bottom:1px solid var(--border-color);font-size:var(--text-sm)}
      table th{background:var(--gray-50);font-weight:600;color:var(--text-secondary)}
      table tr:hover td{background:var(--gray-50)}
      .badge{display:inline-block;padding:4px 10px;border-radius:12px;font-size:var(--text-xs)}
      .badge-active{background:var(--success-light);color:var(--success)}
      .badge-disabled{background:var(--error-light);color:var(--error)}
      .badge-admin{background:var(--primary-100);color:var(--primary-600)}
      .badge-user{background:var(--gray-100);color:var(--gray-600)}
      .btn-sm{padding:6px 12px;font-size:var(--text-xs);border-radius:6px;cursor:pointer;border:none;font-weight:500}
      .btn-danger{background:var(--error);color:#fff}.btn-danger:hover{opacity:0.9}
      .btn-warning{background:#f59e0b;color:#fff}.btn-warning:hover{opacity:0.9}
      .btn-success{background:var(--success);color:#fff}.btn-success:hover{opacity:0.9}
      .btn-outline{background:transparent;border:1px solid var(--border-color);color:var(--text-secondary)}.btn-outline:hover{border-color:var(--primary-500);color:var(--primary-600)}
      .search-bar{display:flex;gap:12px;margin-bottom:16px}
      .search-bar input,.search-bar select{flex:1;padding:10px 14px;border:1px solid var(--border-color);border-radius:var(--radius-md);font-size:var(--text-sm);outline:none}
      .search-bar input:focus,.search-bar select:focus{border-color:var(--primary-500)}
      .tabs{display:flex;gap:4px;margin-bottom:24px;border-bottom:1px solid var(--border-color)}
      .tab{padding:12px 20px;font-size:var(--text-sm);cursor:pointer;border-bottom:2px solid transparent;color:var(--text-secondary)}
      .tab.active{border-color:var(--primary-500);color:var(--primary-600);font-weight:500}
      .tab:hover{color:var(--text-primary)}

      /* 模态框 */
      .modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:200;align-items:center;justify-content:center}
      .modal-overlay.show{display:flex}
      .modal{background:var(--bg-primary);border-radius:var(--radius-lg);width:480px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
      .modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px;border-bottom:1px solid var(--border-color)}
      .modal-title{font-size:var(--text-lg);font-weight:600}
      .modal-close{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:6px;cursor:pointer;border:none;background:transparent;font-size:18px;color:var(--text-tertiary)}
      .modal-close:hover{background:var(--gray-100)}
      .modal-body{padding:20px}
      .modal-footer{padding:16px 20px;border-top:1px solid var(--border-color);display:flex;justify-content:flex-end;gap:12px}
      .form-group{margin-bottom:16px}
      .form-label{display:block;font-size:var(--text-sm);font-weight:500;color:var(--text-secondary);margin-bottom:6px}
      .form-input,.form-select{width:100%;padding:10px 14px;border:1px solid var(--border-color);border-radius:var(--radius-md);font-size:var(--text-sm);outline:none;box-sizing:border-box}
      .form-input:focus,.form-select:focus{border-color:var(--primary-500)}
      .btn-primary{background:var(--primary-600);color:#fff;border:none;border-radius:6px;cursor:pointer;padding:10px 20px;font-size:var(--text-sm);font-weight:500}
      .btn-primary:hover{background:var(--primary-700)}
      .btn-cancel{background:var(--gray-100);color:var(--text-secondary);border:none;border-radius:6px;cursor:pointer;padding:10px 20px;font-size:var(--text-sm)}
      .btn-cancel:hover{background:var(--gray-200)}

      .action-btns{display:flex;gap:6px;flex-wrap:nowrap}
      .action-btns .btn-sm{white-space:nowrap}
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <a href="/" class="sidebar-logo">
                <img src="static/images/logo.svg" alt="智析销售AI">
                <span>管理后台</span>
            </a>
            <nav class="sidebar-nav">
                <!-- 管理功能 -->
                <div class="nav-section">
                    <div class="nav-section-title">管理功能</div>

                    <a class="nav-item active" href="admin.html" onclick="showTab('overview');return false;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="7" height="7"></rect>
                            <rect x="14" y="3" width="7" height="7"></rect>
                            <rect x="14" y="14" width="7" height="7"></rect>
                            <rect x="3" y="14" width="7" height="7"></rect>
                        </svg>
                        数据概览
                    </a>

                    <a class="nav-item" href="#users" onclick="showTab('users')">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                            <circle cx="9" cy="7" r="4"></circle>
                        </svg>
                        用户管理
                    </a>

                    <a class="nav-item" href="#analyses" onclick="showTab('analyses')">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                        </svg>
                        分析记录
                    </a>

                    <a class="nav-item" href="#logs" onclick="showTab('logs')">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 20h9"></path>
                            <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
                        </svg>
                        操作日志
                    </a>
                </div>

                <!-- 返回 -->
                <div class="nav-section">
                    <div class="nav-section-title">返回</div>

                    <a class="nav-item" href="dashboard.html">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                        </svg>
                        返回工作台
                    </a>
                </div>
            </nav>
        </aside>

        <div class="main-area">
            <header class="topbar">
                <div style="font-size:var(--text-lg);font-weight:600">管理后台</div>
                <div id="adminInfo" style="font-size:var(--text-sm);color:var(--text-secondary)">管理员</div>
            </header>

            <div class="content-area">
                <!-- 数据概览 -->
                <div id="tab-overview">
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-label">今日活跃 (DAU)</div>
                            <div class="stat-value" id="dau">0</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">本周活跃 (WAU)</div>
                            <div class="stat-value" id="wau">0</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">总用户数</div>
                            <div class="stat-value" id="totalUsers">0</div>
                            <div class="stat-trend" id="todayUsers">今日新增: 0</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">总分析次数</div>
                            <div class="stat-value" id="totalAnalyses">0</div>
                            <div class="stat-trend" id="todayAnalyses">今日: 0</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">平均评分</div>
                            <div class="stat-value" id="avgScore">0</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">活跃率</div>
                            <div class="stat-value" id="activeRate">0%</div>
                        </div>
                    </div>

                    <div class="grid-2">
                        <div class="section-card">
                            <div class="section-header"><span class="section-title">用户增长趋势 (7天)</span></div>
                            <div class="section-body" style="height:250px"><canvas id="userTrendChart"></canvas></div>
                        </div>
                        <div class="section-card">
                            <div class="section-header"><span class="section-title">分析趋势 (7天)</span></div>
                            <div class="section-body" style="height:250px"><canvas id="analysisTrendChart"></canvas></div>
                        </div>
                    </div>
                </div>

                <!-- 用户管理 -->
                <div id="tab-users" style="display:none">
                    <div class="section-card">
                        <div class="section-header">
                            <span class="section-title">用户管理</span>
                            <span id="userCount" style="font-size:var(--text-sm);color:var(--text-secondary)">共 0 人</span>
                        </div>
                        <div class="section-body">
                            <div class="search-bar">
                                <input type="text" id="userSearch" placeholder="搜索手机号或昵称...">
                                <button class="btn btn-primary btn-sm" onclick="loadUsers()">搜索</button>
                            </div>
                            <div class="table-container">
                                <table>
                                    <thead>
                                        <tr>
                                            <th>ID</th>
                                            <th>手机号</th>
                                            <th>昵称</th>
                                            <th>角色</th>
                                            <th>状态</th>
                                            <th>注册时间</th>
                                            <th>操作</th>
                                        </tr>
                                    </thead>
                                    <tbody id="userTableBody"></tbody>
                                </table>
                            </div>
                            <div id="userPagination"></div>
                        </div>
                    </div>
                </div>

                <!-- 分析记录 -->
                <div id="tab-analyses" style="display:none">
                    <div class="section-card">
                        <div class="section-header">
                            <span class="section-title">分析记录</span>
                            <span id="analysisCount" style="font-size:var(--text-sm);color:var(--text-secondary)">共 0 条</span>
                        </div>
                        <div class="section-body">
                            <div class="search-bar">
                                <input type="text" id="analysisSearch" placeholder="搜索标题或内容...">
                                <button class="btn btn-primary btn-sm" onclick="loadAnalyses()">搜索</button>
                            </div>
                            <div class="table-container">
                                <table>
                                    <thead>
                                        <tr>
                                            <th>ID</th>
                                            <th>标题</th>
                                            <th>用户</th>
                                            <th>评分</th>
                                            <th>时间</th>
                                            <th>操作</th>
                                        </tr>
                                    </thead>
                                    <tbody id="analysisTableBody"></tbody>
                                </table>
                            </div>
                            <div id="analysisPagination"></div>
                        </div>
                    </div>
                </div>

                <!-- 操作日志 -->
                <div id="tab-logs" style="display:none">
                    <div class="section-card">
                        <div class="section-header">
                            <span class="section-title">操作日志</span>
                            <span id="logCount" style="font-size:var(--text-sm);color:var(--text-secondary)">共 0 条</span>
                        </div>
                        <div class="section-body">
                            <div class="search-bar">
                                <select id="logActionFilter">
                                    <option value="">全部操作类型</option>
                                    <option value="delete_user">删除用户</option>
                                    <option value="update_user">更新用户</option>
                                    <option value="disable_user">禁用用户</option>
                                    <option value="enable_user">启用用户</option>
                                    <option value="delete_analysis">删除分析</option>
                                </select>
                                <button class="btn btn-primary btn-sm" onclick="loadLogs()">筛选</button>
                            </div>
                            <div class="table-container">
                                <table>
                                    <thead>
                                        <tr>
                                            <th>ID</th>
                                            <th>管理员</th>
                                            <th>操作类型</th>
                                            <th>目标</th>
                                            <th>详情</th>
                                            <th>IP</th>
                                            <th>时间</th>
                                        </tr>
                                    </thead>
                                    <tbody id="logTableBody"></tbody>
                                </table>
                            </div>
                            <div id="logPagination"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 编辑用户模态框 -->
    <div class="modal-overlay" id="editUserModal">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title">编辑用户</span>
                <button class="modal-close" onclick="closeEditModal()">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editUserId">
                <div class="form-group">
                    <label class="form-label">手机号</label>
                    <input class="form-input" id="editUserPhone" disabled>
                </div>
                <div class="form-group">
                    <label class="form-label">昵称</label>
                    <input class="form-input" id="editUserNickname" placeholder="请输入昵称">
                </div>
                <div class="form-group">
                    <label class="form-label">角色</label>
                    <select class="form-select" id="editUserRole">
                        <option value="user">普通用户</option>
                        <option value="admin">管理员</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">状态</label>
                    <select class="form-select" id="editUserActive">
                        <option value="true">启用</option>
                        <option value="false">禁用</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeEditModal()">取消</button>
                <button class="btn-primary" onclick="saveUserEdit()">保存</button>
            </div>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="static/js/auth.js"></script>
    <script src="static/js/api.js"></script>
    <script src="static/js/utils.js"></script>
    <script src="static/js/pagination.js"></script>
    <script>
        // 权限检查
        if (!window.auth.isLoggedIn()) {
            window.location.href = 'login.html?redirect=admin.html';
        }

        var user = window.auth.getUserInfo();

        // 检查并修复角色信息（支持 phone 或 username 为 admin）
        var isAdmin = (user.phone === 'admin' || user.username === 'admin' || user.role === 'admin');
        if (isAdmin && user.role !== 'admin') {
            user.role = 'admin';
            user.nickname = '管理员';
            window.auth.setAuth(localStorage.getItem('zhixi_token'), user);
        }

        if (!isAdmin) {
            alert('需要管理员权限');
            window.location.href = 'dashboard.html';
        }

        document.getElementById('adminInfo').textContent = '管理员: ' + (user.nickname || user.phone || user.username);

        // 操作类型中文映射
        var actionLabels = {
            'delete_user': '删除用户',
            'update_user': '更新用户',
            'disable_user': '禁用用户',
            'enable_user': '启用用户',
            'delete_analysis': '删除分析'
        };

        // Tab切换
        function showTab(tabName) {
            document.getElementById('tab-overview').style.display = tabName === 'overview' ? 'block' : 'none';
            document.getElementById('tab-users').style.display = tabName === 'users' ? 'block' : 'none';
            document.getElementById('tab-analyses').style.display = tabName === 'analyses' ? 'block' : 'none';
            document.getElementById('tab-logs').style.display = tabName === 'logs' ? 'block' : 'none';

            document.querySelectorAll('.nav-item').forEach(function(item) {
                item.classList.remove('active');
            });
            event.currentTarget.classList.add('active');

            if (tabName === 'users') loadUsers();
            if (tabName === 'analyses') loadAnalyses();
            if (tabName === 'logs') loadLogs();
        }

        // 加载统计数据
        function loadStats() {
            window.api.getAdminStats().then(function(data) {
                utils.animateNumber(document.getElementById('dau'), data.dau, 800);
                utils.animateNumber(document.getElementById('wau'), data.wau, 800);
                utils.animateNumber(document.getElementById('totalUsers'), data.total_users, 1000);
                utils.animateNumber(document.getElementById('totalAnalyses'), data.total_analyses, 1000);
                document.getElementById('todayUsers').textContent = '今日新增: ' + data.today_users;
                document.getElementById('todayAnalyses').textContent = '今日: ' + data.today_analyses;

                document.getElementById('avgScore').textContent = '82';
                document.getElementById('activeRate').textContent = data.total_users > 0 ? Math.round(data.wau / data.total_users * 100) + '%' : '0%';

                drawCharts(data);
            });
        }

        function drawCharts(data) {
            new Chart(document.getElementById('userTrendChart').getContext('2d'), {
                type: 'line',
                data: {
                    labels: data.user_trend.map(function(d) { return d.date; }),
                    datasets: [{
                        label: '新增用户',
                        data: data.user_trend.map(function(d) { return d.count; }),
                        borderColor: '#3B82F6',
                        backgroundColor: 'rgba(59,130,246,0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });

            new Chart(document.getElementById('analysisTrendChart').getContext('2d'), {
                type: 'line',
                data: {
                    labels: data.analysis_trend.map(function(d) { return d.date; }),
                    datasets: [{
                        label: '分析次数',
                        data: data.analysis_trend.map(function(d) { return d.count; }),
                        borderColor: '#10B981',
                        backgroundColor: 'rgba(16,185,129,0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        // ============ 用户管理 ============
        var userPage = 1;
        function loadUsers() {
            var keyword = document.getElementById('userSearch').value;
            window.api.getAdminUsers(userPage, keyword).then(function(data) {
                document.getElementById('userCount').textContent = '共 ' + data.total + ' 人';

                var html = '';
                data.list.forEach(function(u) {
                    html += '<tr>';
                    html += '<td>' + u.id + '</td>';
                    html += '<td>' + u.phone + '</td>';
                    html += '<td>' + (u.nickname || '-') + '</td>';
                    html += '<td><span class="badge ' + (u.role === 'admin' ? 'badge-admin' : 'badge-user') + '">' + (u.role === 'admin' ? '管理员' : '用户') + '</span></td>';
                    html += '<td><span class="badge ' + (u.is_active ? 'badge-active' : 'badge-disabled') + '">' + (u.is_active ? '正常' : '禁用') + '</span></td>';
                    html += '<td>' + utils.formatDate(u.created_at, 'YYYY-MM-DD') + '</td>';
                    html += '<td><div class="action-btns">';
                    html += '<button class="btn-sm btn-outline" onclick="openEditModal(' + u.id + ',\'' + u.phone + '\',\'' + (u.nickname || '') + '\',\'' + u.role + '\',' + u.is_active + ')">编辑</button>';
                    if (u.role !== 'admin' || u.phone !== 'admin') {
                        html += '<button class="btn-sm ' + (u.is_active ? 'btn-warning' : 'btn-success') + '" onclick="toggleUser(' + u.id + ')">' + (u.is_active ? '禁用' : '启用') + '</button>';
                        html += '<button class="btn-sm btn-danger" onclick="deleteUser(' + u.id + ')">删除</button>';
                    }
                    html += '</div></td>';
                    html += '</tr>';
                });
                document.getElementById('userTableBody').innerHTML = html;

                pagination.init({
                    containerId: 'userPagination',
                    pageSize: 20,
                    total: data.total,
                    onPageChange: function(page) { userPage = page; loadUsers(); }
                });
            });
        }

        // 打开编辑模态框
        function openEditModal(id, phone, nickname, role, isActive) {
            document.getElementById('editUserId').value = id;
            document.getElementById('editUserPhone').value = phone;
            document.getElementById('editUserNickname').value = nickname;
            document.getElementById('editUserRole').value = role;
            document.getElementById('editUserActive').value = isActive ? 'true' : 'false';
            document.getElementById('editUserModal').classList.add('show');
        }

        function closeEditModal() {
            document.getElementById('editUserModal').classList.remove('show');
        }

        // 保存编辑
        function saveUserEdit() {
            var userId = document.getElementById('editUserId').value;
            var data = {
                nickname: document.getElementById('editUserNickname').value,
                role: document.getElementById('editUserRole').value,
                is_active: document.getElementById('editUserActive').value === 'true'
            };
            window.api.updateAdminUser(userId, data).then(function() {
                utils.showToast('更新成功', 'success');
                closeEditModal();
                loadUsers();
            }).catch(function(err) {
                utils.showToast(err.message || '更新失败', 'error');
            });
        }

        // 切换禁用/启用
        function toggleUser(userId) {
            window.api.toggleAdminUserActive(userId).then(function() {
                utils.showToast('操作成功', 'success');
                loadUsers();
            }).catch(function(err) {
                utils.showToast(err.message || '操作失败', 'error');
            });
        }

        // 删除用户
        function deleteUser(userId) {
            if (!confirm('确定要删除该用户吗？该用户的分析记录也会被删除。')) return;
            window.api.deleteAdminUser(userId).then(function() {
                utils.showToast('删除成功', 'success');
                loadUsers();
            }).catch(function(err) {
                utils.showToast(err.message || '删除失败', 'error');
            });
        }

        // ============ 分析记录 ============
        var analysisPage = 1;
        function loadAnalyses() {
            var keyword = document.getElementById('analysisSearch').value;
            window.api.getAdminAnalyses(analysisPage, keyword).then(function(data) {
                document.getElementById('analysisCount').textContent = '共 ' + data.total + ' 条';

                var html = '';
                data.list.forEach(function(a) {
                    html += '<tr>';
                    html += '<td>' + a.id + '</td>';
                    html += '<td>' + (a.title || '-').substring(0, 30) + '</td>';
                    html += '<td>' + (a.user_nickname || a.user_phone) + '</td>';
                    html += '<td>' + (a.analysis ? a.analysis.intent_score : '-') + '</td>';
                    html += '<td>' + utils.formatDate(a.created_at, 'YYYY-MM-DD') + '</td>';
                    html += '<td><div class="action-btns">';
                    html += '<a href="analysis.html?id=' + a.id + '" class="btn-sm btn-outline" style="text-decoration:none">查看</a>';
                    html += '<button class="btn-sm btn-danger" onclick="deleteAnalysis(' + a.id + ')">删除</button>';
                    html += '</div></td>';
                    html += '</tr>';
                });
                document.getElementById('analysisTableBody').innerHTML = html;

                pagination.init({
                    containerId: 'analysisPagination',
                    pageSize: 20,
                    total: data.total,
                    onPageChange: function(page) { analysisPage = page; loadAnalyses(); }
                });
            });
        }

        // 删除分析
        function deleteAnalysis(analysisId) {
            if (!confirm('确定要删除该分析记录吗？')) return;
            window.api.deleteAdminAnalysis(analysisId).then(function() {
                utils.showToast('删除成功', 'success');
                loadAnalyses();
            }).catch(function(err) {
                utils.showToast(err.message || '删除失败', 'error');
            });
        }

        // ============ 操作日志 ============
        var logPage = 1;
        function loadLogs() {
            var action = document.getElementById('logActionFilter').value;
            window.api.getOperationLogs(logPage, action).then(function(data) {
                document.getElementById('logCount').textContent = '共 ' + data.total + ' 条';

                var html = '';
                data.list.forEach(function(log) {
                    html += '<tr>';
                    html += '<td>' + log.id + '</td>';
                    html += '<td>' + (log.admin_name || '-') + '</td>';
                    html += '<td><span class="badge badge-admin">' + (actionLabels[log.action] || log.action) + '</span></td>';
                    html += '<td>' + (log.target_type || '-') + '#' + (log.target_id || '-') + '</td>';
                    html += '<td style="max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="' + (log.detail || '') + '">' + (log.detail || '-') + '</td>';
                    html += '<td>' + (log.ip_address || '-') + '</td>';
                    html += '<td>' + utils.formatDate(log.created_at, 'YYYY-MM-DD HH:mm') + '</td>';
                    html += '</tr>';
                });
                document.getElementById('logTableBody').innerHTML = html;

                pagination.init({
                    containerId: 'logPagination',
                    pageSize: 20,
                    total: data.total,
                    onPageChange: function(page) { logPage = page; loadLogs(); }
                });
            });
        }

        // 初始化
        loadStats();
    </script>
</body>
</html>
